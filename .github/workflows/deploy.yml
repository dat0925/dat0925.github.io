name: Build & Deploy Gantt App

on:
  push:
    branches: [master]
    paths:
      - 'react-gantt/**'

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: react-gantt/package-lock.json

      - name: Install dependencies
        working-directory: react-gantt
        run: npm ci

      - name: Build
        working-directory: react-gantt
        run: npm run build

      - name: Deploy to repo root
        working-directory: react-gantt
        run: node deploy.mjs

      - name: Commit and push built files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gantt-app.html gantt-assets/
          git diff --staged --quiet || git commit -m "chore: build gantt app [skip ci]"
          git push
