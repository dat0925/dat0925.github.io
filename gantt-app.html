<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GANTT PRO</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #141720;
  --surface2: #1a1f2e;
  --surface3: #212636;
  --border: #2a3045;
  --border2: #353d56;
  --text: #e8ecf4;
  --text2: #8892aa;
  --text3: #5a6478;
  --accent: #4f7fff;
  --accent2: #6b8fff;
  --accent-glow: rgba(79,127,255,0.15);
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.15);
  --orange: #f59e0b;
  --orange-dim: rgba(245,158,11,0.15);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.15);
  --purple: #a855f7;
  --purple-dim: rgba(168,85,247,0.15);
  --cyan: #06b6d4;
  --today: #ef4444;
  --font: 'DM Sans', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 13px;
}

/* ─── TOP BAR ─── */
#topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  flex-wrap: wrap;
}

.logo {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 2px;
  white-space: nowrap;
}

.project-selector {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 200px;
}

.project-selector select, .project-selector input[type=text] {
  background: var(--surface3);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 5px 10px;
  border-radius: 6px;
  font-family: var(--font);
  font-size: 13px;
  outline: none;
  cursor: pointer;
}

.project-selector select { max-width: 200px; }
.project-selector input[type=text] { width: 160px; }

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--surface3);
  color: var(--text2);
  font-family: var(--font);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:hover { background: var(--accent2); }
.btn.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

/* ─── VIEW TABS ─── */
#view-tabs {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 8px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 53px;
  z-index: 99;
  flex-wrap: wrap;
}

.tab-group {
  display: flex;
  background: var(--surface3);
  border-radius: 8px;
  padding: 2px;
  gap: 2px;
}

.tab {
  padding: 4px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text2);
  transition: all 0.15s;
  white-space: nowrap;
}
.tab.active { background: var(--accent); color: #fff; }
.tab:hover:not(.active) { color: var(--text); background: var(--border); }

#view-tabs .spacer { flex: 1; }
#view-tabs .right-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* ─── BULK ACTION BAR ─── */
#bulk-bar {
  display: none;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  background: var(--accent-glow);
  border-bottom: 1px solid var(--accent);
}
#bulk-bar.visible { display: flex; }
#bulk-bar .bulk-count { font-size: 12px; color: var(--accent); font-weight: 600; }
#bulk-bar select {
  background: var(--surface3); border: 1px solid var(--border2); color: var(--text);
  padding: 4px 8px; border-radius: 5px; font-family: var(--font); font-size: 12px; outline: none;
}

/* ─── MAIN LAYOUT ─── */
#main {
  display: flex;
  height: calc(100vh - 105px);
  overflow: hidden;
}

/* ─── GANTT TABLE ─── */
#gantt-container {
  display: flex;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

#task-panel {
  min-width: 560px;
  width: 560px;
  flex-shrink: 0;
  overflow-y: auto;
  overflow-x: hidden;
  border-right: 2px solid var(--border2);
  background: var(--surface);
}

#chart-panel {
  flex: 1;
  overflow-x: auto;
  overflow-y: auto;
  position: relative;
}

/* ─── TABLE HEADER ─── */
.table-header {
  display: grid;
  grid-template-columns: 28px 28px 24px 1fr 70px 70px 70px 55px 60px;
  align-items: center;
  padding: 0 8px;
  height: 36px;
  background: var(--surface2);
  border-bottom: 2px solid var(--border2);
  position: sticky;
  top: 0;
  z-index: 10;
  gap: 4px;
}
.table-header span {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  white-space: nowrap;
}

/* ─── TASK ROWS ─── */
.phase-header {
  display: grid;
  grid-template-columns: 28px 28px 24px 1fr 70px 70px 70px 55px 60px;
  align-items: center;
  padding: 0 8px;
  height: 32px;
  background: var(--surface3);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  gap: 4px;
  transition: background 0.1s;
}
.phase-header:hover { background: var(--border); }

.phase-toggle {
  display: flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; border-radius: 4px;
  background: var(--border2); color: var(--text2); font-size: 10px;
  transition: transform 0.2s;
}
.phase-toggle.collapsed { transform: rotate(-90deg); }

.phase-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.task-row {
  display: grid;
  grid-template-columns: 28px 28px 24px 1fr 70px 70px 70px 55px 60px;
  align-items: center;
  padding: 0 8px;
  height: 30px;
  border-bottom: 1px solid var(--border);
  gap: 4px;
  cursor: pointer;
  transition: background 0.1s;
}
.task-row:hover { background: var(--surface2); }
.task-row.selected { background: var(--accent-glow); }
.task-row.child { padding-left: 20px; }

.task-check input[type=checkbox] {
  width: 14px; height: 14px; cursor: pointer; accent-color: var(--accent);
}

.task-expand {
  display: flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; border-radius: 4px;
  color: var(--text3); font-size: 10px; cursor: pointer;
  transition: background 0.1s;
}
.task-expand:hover { background: var(--border2); color: var(--text2); }

.task-name-cell {
  display: flex; align-items: center; gap: 4px;
  overflow: hidden;
}
.task-name-text {
  font-size: 12px; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1;
}
.task-name-text.completed { text-decoration: line-through; color: var(--text3); }

.status-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.status-todo { background: var(--text3); }
.status-inprogress { background: var(--accent); }
.status-requested { background: var(--orange); }
.status-done { background: var(--green); }
.status-cancelled { background: var(--red); }

.task-date { font-size: 11px; color: var(--text2); font-family: var(--mono); white-space: nowrap; }
.task-effort { font-size: 11px; color: var(--text2); font-family: var(--mono); text-align: center; }
.task-assignee {
  font-size: 10px; color: var(--text2); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.task-updated { font-size: 10px; color: var(--text3); font-family: var(--mono); white-space: nowrap; }

/* ─── CHART HEADER ─── */
#chart-header-container {
  position: sticky;
  top: 0;
  z-index: 9;
  background: var(--surface);
}

.chart-header-row {
  display: flex;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  min-height: 18px;
}
.chart-header-row.bottom {
  border-bottom: 2px solid var(--border2);
}

.header-cell {
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--text3); font-family: var(--mono);
  border-right: 1px solid var(--border);
  flex-shrink: 0;
  font-weight: 500;
}
.header-cell.month { color: var(--text2); font-weight: 600; font-size: 11px; }
.header-cell.today-col { color: var(--today); font-weight: 700; }
.header-cell.weekend { color: var(--purple); }
.header-cell.holiday { color: var(--orange); }

/* ─── CHART ROWS ─── */
.chart-row {
  display: flex;
  position: relative;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.chart-row.phase-row { background: var(--surface3); height: 32px; }
.chart-row.task-row-chart { height: 30px; }

.chart-cell {
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  position: relative;
}
.chart-cell.today-col { border-right-color: var(--today); background: rgba(239,68,68,0.04); }
.chart-cell.weekend { background: rgba(168,85,247,0.04); }
.chart-cell.holiday { background: rgba(245,158,11,0.06); }

/* ─── GANTT BAR ─── */
.gantt-bar {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  border-radius: 4px;
  height: 16px;
  min-width: 4px;
  cursor: pointer;
  transition: filter 0.15s, opacity 0.15s;
  z-index: 2;
  display: flex; align-items: center;
  overflow: hidden;
}
.gantt-bar:hover { filter: brightness(1.2); }
.gantt-bar .bar-label {
  font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.9);
  padding: 0 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.gantt-bar-todo { background: linear-gradient(90deg, #3a4460, #4a5580); }
.gantt-bar-inprogress { background: linear-gradient(90deg, #2a4acc, #4f7fff); }
.gantt-bar-requested { background: linear-gradient(90deg, #9c6400, #f59e0b); }
.gantt-bar-done { background: linear-gradient(90deg, #15803d, #22c55e); }
.gantt-bar-cancelled { background: linear-gradient(90deg, #9f1239, #ef4444); }

.gantt-bar-phase { height: 12px; border-radius: 3px; }

/* complete diamond */
.complete-diamond {
  position: absolute;
  top: 50%; transform: translateY(-50%) rotate(45deg);
  width: 8px; height: 8px;
  background: var(--green);
  border: 2px solid var(--bg);
  z-index: 3;
  cursor: pointer;
}

/* today line */
.today-line {
  position: absolute;
  top: 0; bottom: 0;
  width: 2px;
  background: var(--today);
  z-index: 5;
  pointer-events: none;
}
.today-line::before {
  content: '';
  position: absolute;
  top: 0; left: -4px;
  border: 5px solid transparent;
  border-top-color: var(--today);
}

/* ─── SUMMARY VIEW ─── */
#summary-view {
  display: none;
  padding: 20px;
  overflow-y: auto;
  height: calc(100vh - 105px);
}
#summary-view.active { display: block; }

.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.summary-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  transition: border-color 0.15s;
}
.summary-card:hover { border-color: var(--border2); }
.summary-card .card-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
.summary-card .card-value { font-size: 28px; font-weight: 700; font-family: var(--mono); }
.summary-card .card-value.accent { color: var(--accent); }
.summary-card .card-value.green { color: var(--green); }
.summary-card .card-value.orange { color: var(--orange); }
.summary-card .card-value.red { color: var(--red); }

.summary-section-title {
  font-size: 13px; font-weight: 600; color: var(--text);
  margin: 20px 0 10px; display: flex; align-items: center; gap: 8px;
}
.summary-section-title::before {
  content: ''; width: 3px; height: 14px;
  background: var(--accent); border-radius: 2px;
}

.progress-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: start;
}
.progress-item.danger { border-color: var(--red); background: var(--red-dim); }
.progress-item.warning { border-color: var(--orange); background: var(--orange-dim); }

.progress-info .task-title { font-size: 12px; font-weight: 500; color: var(--text); }
.progress-info .task-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
.progress-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; margin-top: 6px; }
.progress-bar-fill { height: 4px; border-radius: 2px; transition: width 0.3s; }
.progress-pct { font-size: 12px; font-family: var(--mono); color: var(--text2); font-weight: 600; }

/* ─── MODAL ─── */
#modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
#modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6);
}

.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 14px; font-weight: 600; color: var(--text); }
.modal-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 18px; padding: 2px 6px; border-radius: 4px; }
.modal-close:hover { background: var(--border); color: var(--text); }

.modal-body { padding: 20px; }

.form-group {
  margin-bottom: 14px;
}
.form-label {
  display: block; font-size: 11px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px;
}
.form-control {
  width: 100%;
  background: var(--surface3);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 7px 10px;
  border-radius: 6px;
  font-family: var(--font);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
.form-control:focus { border-color: var(--accent); }
.form-control option { background: var(--surface3); }

textarea.form-control { min-height: 70px; resize: vertical; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.modal-footer {
  display: flex; justify-content: flex-end; gap: 8px;
  padding: 14px 20px;
  border-top: 1px solid var(--border);
}

/* ─── SEARCH & FILTER ─── */
.filter-bar {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.filter-bar input[type=text] {
  background: var(--surface3); border: 1px solid var(--border2); color: var(--text);
  padding: 5px 10px; border-radius: 6px; font-family: var(--font); font-size: 12px; outline: none;
  width: 140px;
}
.filter-bar select {
  background: var(--surface3); border: 1px solid var(--border2); color: var(--text);
  padding: 5px 8px; border-radius: 6px; font-family: var(--font); font-size: 12px; outline: none; cursor: pointer;
}

/* ─── STATUS BADGES ─── */
.badge {
  display: inline-flex; align-items: center;
  padding: 1px 6px; border-radius: 4px;
  font-size: 10px; font-weight: 600; white-space: nowrap;
}
.badge-todo { background: rgba(90,100,120,0.3); color: #8892aa; }
.badge-inprogress { background: var(--accent-glow); color: var(--accent); }
.badge-requested { background: var(--orange-dim); color: var(--orange); }
.badge-done { background: var(--green-dim); color: var(--green); }
.badge-cancelled { background: var(--red-dim); color: var(--red); }

/* ─── EMPTY STATE ─── */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 60px 20px; color: var(--text3);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
.empty-state .title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state .desc { font-size: 12px; color: var(--text3); }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  #task-panel { min-width: 100%; width: 100%; border-right: none; border-bottom: 2px solid var(--border2); }
  #gantt-container { flex-direction: column; height: auto; overflow: visible; }
  #main { height: auto; overflow: visible; }
  #chart-panel { height: 400px; }
  .table-header, .task-row, .phase-header {
    grid-template-columns: 28px 24px 1fr 70px 55px;
  }
  .task-date:nth-child(6), .task-assignee, .task-updated { display: none; }
  .logo { font-size: 13px; }
  #topbar { padding: 8px 12px; }
  #view-tabs { padding: 6px 12px; top: 45px; }
  #main { height: calc(100vh - 96px); }
}

/* ─── TOOLTIP ─── */
.tooltip {
  position: fixed;
  background: var(--surface3);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 11px;
  color: var(--text);
  pointer-events: none;
  z-index: 300;
  white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  display: none;
}

.no-project-msg {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--text3); gap: 12px;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="logo">◈ GANTT PRO</div>
  <div class="project-selector">
    <select id="project-select" onchange="switchProject(this.value)">
      <option value="">プロジェクトを選択...</option>
    </select>
    <input type="text" id="new-project-name" placeholder="新規プロジェクト名" maxlength="40">
    <button class="btn primary" onclick="addProject()">+ 作成</button>
  </div>
  <div class="topbar-right">
    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="🔍 タスク検索..." oninput="renderAll()">
      <select id="filter-status" onchange="renderAll()">
        <option value="">全ステータス</option>
        <option value="todo">未着手</option>
        <option value="inprogress">進行中</option>
        <option value="requested">依頼中</option>
        <option value="done">完了</option>
        <option value="cancelled">不用</option>
      </select>
      <select id="filter-assignee" onchange="renderAll()">
        <option value="">全担当者</option>
      </select>
    </div>
    <button class="btn" onclick="showAddTask()">+ タスク追加</button>
    <button class="btn" onclick="showAddPhase()">+ フェーズ追加</button>
    <button class="btn" id="csv-import-btn" onclick="document.getElementById('csv-input').click()">↑ CSV</button>
    <input type="file" id="csv-input" accept=".csv" style="display:none" onchange="importCSV(event)">
    <button class="btn" onclick="exportCSV()">↓ CSV</button>
  </div>
</div>

<!-- VIEW TABS -->
<div id="view-tabs">
  <div class="tab-group">
    <div class="tab active" data-view="gantt" onclick="switchView('gantt')">ガントチャート</div>
    <div class="tab" data-view="summary" onclick="switchView('summary')">サマリー</div>
  </div>
  <div class="spacer"></div>
  <div class="right-controls">
    <div class="tab-group" id="scale-tabs">
      <div class="tab active" data-scale="day" onclick="setScale('day')">日</div>
      <div class="tab" data-scale="week" onclick="setScale('week')">週</div>
      <div class="tab" data-scale="month" onclick="setScale('month')">月</div>
    </div>
    <button class="btn" onclick="scrollToToday()">Today</button>
    <button class="btn" onclick="navigateChart(-1)">◀</button>
    <button class="btn" onclick="navigateChart(1)">▶</button>
    <button class="btn" onclick="deleteProject()" style="color:var(--red)">🗑 プロジェクト削除</button>
  </div>
</div>

<!-- BULK ACTION BAR -->
<div id="bulk-bar">
  <span class="bulk-count" id="bulk-count">0件選択中</span>
  <select id="bulk-status-select">
    <option value="">ステータスを変更...</option>
    <option value="todo">未着手</option>
    <option value="inprogress">進行中</option>
    <option value="requested">依頼中</option>
    <option value="done">完了</option>
    <option value="cancelled">不用</option>
  </select>
  <button class="btn primary" onclick="applyBulkStatus()">適用</button>
  <button class="btn" onclick="clearSelection()">選択解除</button>
</div>

<!-- MAIN -->
<div id="main">
  <!-- GANTT VIEW -->
  <div id="gantt-container">
    <div id="task-panel">
      <div class="table-header">
        <span><input type="checkbox" id="select-all" onchange="toggleSelectAll(this)" style="width:14px;height:14px;accent-color:var(--accent);"></span>
        <span></span>
        <span></span>
        <span>タスク名</span>
        <span>開始日</span>
        <span>終了日</span>
        <span>完了日</span>
        <span>工数h</span>
        <span>更新</span>
      </div>
      <div id="task-list"></div>
    </div>
    <div id="chart-panel">
      <div id="chart-header-container"></div>
      <div id="chart-body"></div>
    </div>
  </div>

  <!-- SUMMARY VIEW -->
  <div id="summary-view">
    <div id="summary-content"></div>
  </div>
</div>

<!-- TOOLTIP -->
<div class="tooltip" id="tooltip"></div>

<!-- MODAL -->
<div id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">タスク追加</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn primary" id="modal-submit" onclick="submitModal()">保存</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// DATA MODEL
// ════════════════════════════════════════════
let state = {
  projects: {}, // { id: { name, tasks, phases } }
  currentProject: null,
  view: 'gantt',
  scale: 'day',
  chartStartDate: null,
  selectedTasks: new Set(),
  expandedPhases: new Set(),
};

const STATUS_LABELS = {
  todo: '未着手',
  inprogress: '進行中',
  requested: '依頼中',
  done: '完了',
  cancelled: '不用',
};

const JP_HOLIDAYS_2026 = [
  '2026-01-01','2026-01-12','2026-02-11','2026-02-23',
  '2026-03-20','2026-04-29','2026-05-03','2026-05-04',
  '2026-05-05','2026-07-20','2026-08-11','2026-09-21',
  '2026-09-22','2026-09-23','2026-10-12','2026-11-03',
  '2026-11-23','2026-12-23',
];
const JP_HOLIDAYS_2025 = [
  '2025-01-01','2025-01-13','2025-02-11','2025-02-23',
  '2025-03-20','2025-04-29','2025-05-03','2025-05-04',
  '2025-05-05','2025-07-21','2025-08-11','2025-09-15',
  '2025-09-22','2025-09-23','2025-10-13','2025-11-03',
  '2025-11-23','2025-11-24','2025-12-23',
];
const HOLIDAYS = new Set([...JP_HOLIDAYS_2025, ...JP_HOLIDAYS_2026]);

function isHoliday(dateStr) { return HOLIDAYS.has(dateStr); }
function isWeekend(date) { const d = date.getDay(); return d === 0 || d === 6; }
function toDateStr(date) { return date.toISOString().split('T')[0]; }
function parseDate(s) { return s ? new Date(s + 'T00:00:00') : null; }
function formatDate(s) {
  if (!s) return '';
  const d = parseDate(s);
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function formatDateShort(s) {
  if (!s) return '';
  const d = parseDate(s);
  return `${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}`;
}
function today() { return toDateStr(new Date()); }
function addDays(dateStr, n) {
  const d = parseDate(dateStr);
  d.setDate(d.getDate() + n);
  return toDateStr(d);
}
function diffDays(a, b) {
  return Math.round((parseDate(b) - parseDate(a)) / 86400000);
}

const DAY_NAMES = ['日','月','火','水','木','金','土'];

// ════════════════════════════════════════════
// STORAGE
// ════════════════════════════════════════════
function save() {
  localStorage.setItem('gantt_pro_v2', JSON.stringify(state.projects));
  localStorage.setItem('gantt_pro_current', state.currentProject || '');
}

function load() {
  try {
    const data = localStorage.getItem('gantt_pro_v2');
    if (data) state.projects = JSON.parse(data);
    state.currentProject = localStorage.getItem('gantt_pro_current') || null;
    if (state.currentProject && !state.projects[state.currentProject]) {
      state.currentProject = null;
    }
  } catch(e) { state.projects = {}; }
}

function getProject() {
  if (!state.currentProject) return null;
  return state.projects[state.currentProject];
}

function getTasks() {
  const p = getProject();
  return p ? p.tasks : [];
}

function getPhases() {
  const p = getProject();
  return p ? p.phases : [];
}

// ════════════════════════════════════════════
// PROJECT MANAGEMENT
// ════════════════════════════════════════════
function addProject() {
  const name = document.getElementById('new-project-name').value.trim();
  if (!name) return alert('プロジェクト名を入力してください');
  const id = 'proj_' + Date.now();
  state.projects[id] = { name, tasks: [], phases: [] };
  document.getElementById('new-project-name').value = '';
  save();
  renderProjectSelect();
  switchProject(id);
}

function switchProject(id) {
  state.currentProject = id || null;
  state.selectedTasks.clear();
  state.expandedPhases.clear();
  if (id) {
    const phases = getPhases();
    phases.forEach(p => state.expandedPhases.add(p.id));
  }
  save();
  renderAll();
  renderProjectSelect();
  updateAssigneeFilter();
}

function deleteProject() {
  if (!state.currentProject) return;
  const p = getProject();
  if (!confirm(`「${p.name}」を削除しますか？`)) return;
  delete state.projects[state.currentProject];
  state.currentProject = null;
  save();
  renderProjectSelect();
  switchProject('');
}

function renderProjectSelect() {
  const sel = document.getElementById('project-select');
  sel.innerHTML = '<option value="">プロジェクトを選択...</option>';
  Object.entries(state.projects).forEach(([id, p]) => {
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = p.name;
    if (id === state.currentProject) opt.selected = true;
    sel.appendChild(opt);
  });
}

// ════════════════════════════════════════════
// TASK / PHASE CRUD
// ════════════════════════════════════════════
let modalMode = null;
let editingId = null;

function newTaskObj(overrides = {}) {
  return {
    id: 'task_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
    phaseId: null,
    parentId: null,
    name: '',
    startDate: today(),
    endDate: addDays(today(), 6),
    completedDate: null,
    status: 'todo',
    assignee: '',
    effort: 1,
    memo: '',
    updatedAt: today(),
    ...overrides,
  };
}

function newPhaseObj(overrides = {}) {
  return {
    id: 'phase_' + Date.now(),
    name: '',
    startDate: today(),
    endDate: addDays(today(), 13),
    color: '#4f7fff',
    ...overrides,
  };
}

function showAddTask(parentId = null) {
  if (!state.currentProject) return alert('プロジェクトを選択してください');
  modalMode = 'addTask';
  editingId = null;
  document.getElementById('modal-title').textContent = parentId ? 'サブタスク追加' : 'タスク追加';
  const phases = getPhases();
  document.getElementById('modal-body').innerHTML = taskFormHTML(null, parentId, phases);
  document.getElementById('modal-overlay').classList.add('open');
}

function showAddPhase() {
  if (!state.currentProject) return alert('プロジェクトを選択してください');
  modalMode = 'addPhase';
  editingId = null;
  document.getElementById('modal-title').textContent = 'フェーズ追加';
  document.getElementById('modal-body').innerHTML = phaseFormHTML(null);
  document.getElementById('modal-overlay').classList.add('open');
}

function editTask(id) {
  const tasks = getTasks();
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  modalMode = 'editTask';
  editingId = id;
  document.getElementById('modal-title').textContent = 'タスク編集';
  const phases = getPhases();
  document.getElementById('modal-body').innerHTML = taskFormHTML(task, task.parentId, phases);
  document.getElementById('modal-overlay').classList.add('open');
}

function editPhase(id) {
  const phases = getPhases();
  const phase = phases.find(p => p.id === id);
  if (!phase) return;
  modalMode = 'editPhase';
  editingId = id;
  document.getElementById('modal-title').textContent = 'フェーズ編集';
  document.getElementById('modal-body').innerHTML = phaseFormHTML(phase);
  document.getElementById('modal-overlay').classList.add('open');
}

function taskFormHTML(task, parentId, phases) {
  const t = task || newTaskObj({ parentId });
  const phaseOptions = phases.map(p =>
    `<option value="${p.id}" ${t.phaseId === p.id ? 'selected':''}>${p.name}</option>`
  ).join('');
  return `
    <div class="form-group">
      <label class="form-label">タスク名 *</label>
      <input class="form-control" id="f-name" value="${esc(t.name)}" placeholder="タスク名を入力">
    </div>
    <div class="form-group">
      <label class="form-label">フェーズ</label>
      <select class="form-control" id="f-phase">
        <option value="">なし</option>
        ${phaseOptions}
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">開始日 *</label>
        <input class="form-control" type="date" id="f-start" value="${t.startDate}">
      </div>
      <div class="form-group">
        <label class="form-label">終了予定日 *</label>
        <input class="form-control" type="date" id="f-end" value="${t.endDate}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">ステータス</label>
        <select class="form-control" id="f-status">
          ${Object.entries(STATUS_LABELS).map(([v,l]) =>
            `<option value="${v}" ${t.status===v?'selected':''}>${l}</option>`
          ).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">工数（h）</label>
        <input class="form-control" type="number" id="f-effort" value="${t.effort}" min="0" step="0.5">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">担当者</label>
        <input class="form-control" id="f-assignee" value="${esc(t.assignee)}" placeholder="担当者名">
      </div>
      <div class="form-group">
        <label class="form-label">完了日</label>
        <input class="form-control" type="date" id="f-completed" value="${t.completedDate||''}">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">進捗メモ</label>
      <textarea class="form-control" id="f-memo" placeholder="進捗・備考など...">${esc(t.memo)}</textarea>
    </div>
    <input type="hidden" id="f-parent" value="${parentId||''}">
  `;
}

function phaseFormHTML(phase) {
  const p = phase || newPhaseObj();
  return `
    <div class="form-group">
      <label class="form-label">フェーズ名 *</label>
      <input class="form-control" id="f-name" value="${esc(p.name)}" placeholder="フェーズ名を入力">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">開始日 *</label>
        <input class="form-control" type="date" id="f-start" value="${p.startDate}">
      </div>
      <div class="form-group">
        <label class="form-label">終了日 *</label>
        <input class="form-control" type="date" id="f-end" value="${p.endDate}">
      </div>
    </div>
  `;
}

function submitModal() {
  if (modalMode === 'addTask' || modalMode === 'editTask') submitTaskModal();
  else if (modalMode === 'addPhase' || modalMode === 'editPhase') submitPhaseModal();
}

function submitTaskModal() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) return alert('タスク名を入力してください');
  const startDate = document.getElementById('f-start').value;
  const endDate = document.getElementById('f-end').value;
  if (!startDate || !endDate) return alert('日付を入力してください');

  const status = document.getElementById('f-status').value;
  let completedDate = document.getElementById('f-completed').value || null;
  // Auto set completed date
  if (status === 'done' && !completedDate) completedDate = today();
  if (status !== 'done') completedDate = null;

  const task = {
    id: editingId || ('task_' + Date.now() + '_' + Math.random().toString(36).slice(2,6)),
    phaseId: document.getElementById('f-phase').value || null,
    parentId: document.getElementById('f-parent').value || null,
    name,
    startDate,
    endDate,
    completedDate,
    status,
    assignee: document.getElementById('f-assignee').value.trim(),
    effort: parseFloat(document.getElementById('f-effort').value) || 1,
    memo: document.getElementById('f-memo').value.trim(),
    updatedAt: today(),
  };

  const p = getProject();
  if (modalMode === 'addTask') {
    p.tasks.push(task);
  } else {
    const idx = p.tasks.findIndex(t => t.id === editingId);
    if (idx !== -1) p.tasks[idx] = task;
  }
  save();
  closeModal();
  renderAll();
  updateAssigneeFilter();
}

function submitPhaseModal() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) return alert('フェーズ名を入力してください');
  const startDate = document.getElementById('f-start').value;
  const endDate = document.getElementById('f-end').value;
  if (!startDate || !endDate) return alert('日付を入力してください');

  const phase = {
    id: editingId || ('phase_' + Date.now()),
    name,
    startDate,
    endDate,
  };

  const p = getProject();
  if (modalMode === 'addPhase') {
    p.phases.push(phase);
    state.expandedPhases.add(phase.id);
  } else {
    const idx = p.phases.findIndex(ph => ph.id === editingId);
    if (idx !== -1) p.phases[idx] = phase;
  }
  save();
  closeModal();
  renderAll();
}

function deleteTask(id) {
  if (!confirm('このタスクを削除しますか？')) return;
  const p = getProject();
  p.tasks = p.tasks.filter(t => t.id !== id && t.parentId !== id);
  save(); renderAll();
}

function deletePhase(id) {
  if (!confirm('このフェーズを削除しますか？（タスクは削除されません）')) return;
  const p = getProject();
  p.phases = p.phases.filter(ph => ph.id !== id);
  p.tasks.forEach(t => { if (t.phaseId === id) t.phaseId = null; });
  save(); renderAll();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalMode = null; editingId = null;
}

// ════════════════════════════════════════════
// SELECTION
// ════════════════════════════════════════════
function toggleTask(id, checked) {
  if (checked) state.selectedTasks.add(id);
  else state.selectedTasks.delete(id);
  updateBulkBar();
}

function toggleSelectAll(cb) {
  const tasks = getFilteredTasks();
  tasks.forEach(t => {
    if (cb.checked) state.selectedTasks.add(t.id);
    else state.selectedTasks.delete(t.id);
  });
  updateBulkBar();
  renderTaskList();
}

function clearSelection() {
  state.selectedTasks.clear();
  updateBulkBar();
  renderTaskList();
  document.getElementById('select-all').checked = false;
}

function updateBulkBar() {
  const bar = document.getElementById('bulk-bar');
  const count = state.selectedTasks.size;
  if (count > 0) {
    bar.classList.add('visible');
    document.getElementById('bulk-count').textContent = `${count}件選択中`;
  } else {
    bar.classList.remove('visible');
  }
}

function applyBulkStatus() {
  const sel = document.getElementById('bulk-status-select');
  const status = sel.value;
  if (!status) return;
  const p = getProject();
  p.tasks.forEach(t => {
    if (state.selectedTasks.has(t.id)) {
      t.status = status;
      if (status === 'done') {
        if (!t.completedDate) t.completedDate = today();
      } else {
        t.completedDate = null;
      }
      t.updatedAt = today();
    }
  });
  save(); renderAll();
  sel.value = '';
}

// ════════════════════════════════════════════
// FILTERS
// ════════════════════════════════════════════
function getFilteredTasks() {
  const tasks = getTasks();
  const search = document.getElementById('search-input')?.value.toLowerCase() || '';
  const statusFilter = document.getElementById('filter-status')?.value || '';
  const assigneeFilter = document.getElementById('filter-assignee')?.value || '';
  return tasks.filter(t => {
    if (search && !t.name.toLowerCase().includes(search)) return false;
    if (statusFilter && t.status !== statusFilter) return false;
    if (assigneeFilter && t.assignee !== assigneeFilter) return false;
    return true;
  });
}

function updateAssigneeFilter() {
  const tasks = getTasks();
  const assignees = [...new Set(tasks.map(t => t.assignee).filter(Boolean))];
  const sel = document.getElementById('filter-assignee');
  const cur = sel.value;
  sel.innerHTML = '<option value="">全担当者</option>';
  assignees.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a; opt.textContent = a;
    if (a === cur) opt.selected = true;
    sel.appendChild(opt);
  });
}

// ════════════════════════════════════════════
// CHART SCALE / NAVIGATION
// ════════════════════════════════════════════
function setScale(scale) {
  state.scale = scale;
  document.querySelectorAll('#scale-tabs .tab').forEach(t => {
    t.classList.toggle('active', t.dataset.scale === scale);
  });
  renderAll();
}

function getChartDates() {
  const tasks = getTasks();
  const phases = getPhases();
  let allDates = [today()];
  tasks.forEach(t => { if (t.startDate) allDates.push(t.startDate); if (t.endDate) allDates.push(t.endDate); });
  phases.forEach(p => { if (p.startDate) allDates.push(p.startDate); if (p.endDate) allDates.push(p.endDate); });
  allDates.sort();

  let start = allDates[0] || today();
  let end = allDates[allDates.length - 1] || addDays(today(), 30);

  // Add padding
  start = addDays(start, -7);
  end = addDays(end, 14);

  // Apply navigation offset
  if (state.chartStartDate) start = state.chartStartDate;

  // Calculate visible range based on scale
  let daysToShow;
  if (state.scale === 'day') daysToShow = 90;
  else if (state.scale === 'week') daysToShow = 180;
  else daysToShow = 365;

  end = addDays(start, daysToShow - 1);

  const dates = [];
  let cur = start;
  while (cur <= end) {
    dates.push(cur);
    cur = addDays(cur, 1);
  }
  return { dates, start, end };
}

function navigateChart(dir) {
  const { start } = getChartDates();
  let n = state.scale === 'day' ? 30 : state.scale === 'week' ? 60 : 90;
  state.chartStartDate = addDays(start, dir * n);
  renderChart();
}

function scrollToToday() {
  state.chartStartDate = addDays(today(), -7);
  renderChart();
}

function getCellWidth() {
  if (state.scale === 'day') return 28;
  if (state.scale === 'week') return 14;
  return 7;
}

// ════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════
function renderAll() {
  renderProjectSelect();
  if (state.view === 'gantt') {
    renderTaskList();
    renderChart();
  } else {
    renderSummary();
  }
}

function switchView(view) {
  state.view = view;
  document.querySelectorAll('#view-tabs .tab[data-view]').forEach(t => {
    t.classList.toggle('active', t.dataset.view === view);
  });
  document.getElementById('gantt-container').style.display = view === 'gantt' ? 'flex' : 'none';
  const sv = document.getElementById('summary-view');
  sv.style.display = view === 'summary' ? 'block' : 'none';
  if (view === 'summary') renderSummary();
}

// ── TASK LIST ──
function renderTaskList() {
  const container = document.getElementById('task-list');
  if (!state.currentProject) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📋</div><div class="title">プロジェクトを選択してください</div></div>`;
    return;
  }
  const phases = getPhases();
  const tasks = getFilteredTasks();
  const rootTasks = tasks.filter(t => !t.parentId && !t.phaseId);
  let html = '';

  // Phases with their tasks
  phases.forEach(phase => {
    const phaseTasks = tasks.filter(t => t.phaseId === phase.id && !t.parentId);
    const isExpanded = state.expandedPhases.has(phase.id);
    html += renderPhaseRow(phase, phaseTasks, isExpanded);
    if (isExpanded) {
      phaseTasks.forEach(task => {
        html += renderTaskRow(task);
        const children = tasks.filter(t => t.parentId === task.id);
        children.forEach(child => html += renderTaskRow(child, true));
      });
    }
  });

  // Tasks without phase
  rootTasks.forEach(task => {
    html += renderTaskRow(task);
    const children = tasks.filter(t => t.parentId === task.id);
    children.forEach(child => html += renderTaskRow(child, true));
  });

  if (!html) {
    html = `<div class="empty-state"><div class="icon">✅</div><div class="title">タスクがありません</div><div class="desc">「+ タスク追加」からタスクを作成してください</div></div>`;
  }
  container.innerHTML = html;
}

function renderPhaseRow(phase, tasks, isExpanded) {
  return `<div class="phase-header" onclick="togglePhase('${phase.id}')" ondblclick="editPhase('${phase.id}')">
    <span></span>
    <span class="phase-toggle ${isExpanded?'':'collapsed'}">▼</span>
    <span></span>
    <span class="phase-name">${esc(phase.name)}</span>
    <span class="task-date">${formatDateShort(phase.startDate)}</span>
    <span class="task-date">${formatDateShort(phase.endDate)}</span>
    <span class="task-date"></span>
    <span class="task-effort">${tasks.reduce((s,t)=>s+(t.effort||0),0)}h</span>
    <span></span>
  </div>`;
}

function renderTaskRow(task, isChild = false) {
  const tasks = getTasks();
  const children = tasks.filter(t => t.parentId === task.id);
  const hasChildren = children.length > 0;
  const isExpanded = state.expandedPhases.has('expand_' + task.id);
  const isSelected = state.selectedTasks.has(task.id);
  const statusClass = `status-${task.status}`;
  const nameClass = task.status === 'done' ? 'task-name-text completed' : 'task-name-text';

    </span>
    <span><span class="status-dot ${statusClass}"></span></span>
    <span class="task-name-cell">
      <span class="${nameClass}" title="${esc(task.name)}">${esc(task.name)}</span>
    </span>
    <span class="task-date">${formatDateShort(task.startDate)}</span>
    <span class="task-date">${formatDateShort(task.endDate)}</span>
    <span class="task-date">${task.completedDate ? formatDateShort(task.completedDate) : ''}</span>
    <span class="task-effort">${task.effort||1}h</span>
    <span class="task-updated">${task.updatedAt?task.updatedAt.slice(5):''}</span>
  </div>`;
}

function handleTaskRowClick(e, id) {

}

function togglePhase(id) {
  if (state.expandedPhases.has(id)) state.expandedPhases.delete(id);
  else state.expandedPhases.add(id);

  renderChartBody();
}

function toggleExpandTask(id) {
  const key = 'expand_' + id;
  if (state.expandedPhases.has(key)) state.expandedPhases.delete(key);
  else state.expandedPhases.add(key);

  renderChartBody();
}

function renderChartBody() {
  const { dates, start } = getChartDates();
  const cellW = getCellWidth();
  const totalWidth = dates.length * cellW;
  const container = document.getElementById('chart-body');
  const phases = getPhases();
  const tasks = getFilteredTasks();
  const todayStr = today();

  let html = `<div style="position:relative;width:${totalWidth}px">`;

  // Today line
  const todayIdx = dates.indexOf(todayStr);
  if (todayIdx >= 0) {
    html += `<div class="today-line" style="left:${todayIdx*cellW + cellW/2}px"></div>`;
  }

  // Rows matching task list order
  const renderRow = (type, data, isChild = false) => {
    const rowH = type === 'phase' ? 32 : 30;
    let rowHtml = `<div class="chart-row ${type === 'phase' ? 'phase-row' : 'task-row-chart'}" style="height:${rowH}px;width:${totalWidth}px">`;

    dates.forEach(d => {
      const dt = parseDate(d);
      let cls = 'chart-cell';
      if (d === todayStr) cls += ' today-col';
      else if (isHoliday(d)) cls += ' holiday';
      else if (isWeekend(dt)) cls += ' weekend';
      rowHtml += `<div class="${cls}" style="width:${cellW}px;height:${rowH}px"></div>`;
    });

    // Bar
    if (type === 'task') {
      const task = data;
      if (task.startDate && task.endDate) {
        const s = dates.indexOf(task.startDate);
        const e = dates.indexOf(task.endDate);
        if (s >= 0 || e >= 0) {
          const barStart = Math.max(0, s);
          const barEnd = Math.min(dates.length - 1, e >= 0 ? e : dates.length - 1);
          const barW = Math.max(cellW, (barEnd - barStart + 1) * cellW);
          const barLeft = barStart * cellW;
          const barClass = `gantt-bar gantt-bar-${task.status}`;
          rowHtml += `<div class="${barClass}" style="left:${barLeft}px;width:${barW}px"
            onclick="editTask('${task.id}')"
            onmouseenter="showTooltip(event,'${esc(task.name)}<br>${STATUS_LABELS[task.status]} | ${task.assignee||'未担当'} | ${task.effort||1}h')"
            onmouseleave="hideTooltip()">
            <span class="bar-label">${esc(task.name)}</span>
          </div>`;
        }
      }
      // Completed diamond
      if (task.completedDate) {
        const ci = dates.indexOf(task.completedDate);
        if (ci >= 0) {
          rowHtml += `<div class="complete-diamond" style="left:${ci*cellW + cellW/2 - 4}px" title="完了: ${task.completedDate}"></div>`;
        }
      }
    } else if (type === 'phase') {
      const phase = data;
      if (phase.startDate && phase.endDate) {
        const s = dates.indexOf(phase.startDate);
        const e = dates.indexOf(phase.endDate);
        if (s >= 0 || e >= 0) {
          const barStart = Math.max(0, s);
          const barEnd = Math.min(dates.length - 1, e >= 0 ? e : dates.length - 1);
          const barW = Math.max(cellW, (barEnd - barStart + 1) * cellW);
          rowHtml += `<div class="gantt-bar gantt-bar-phase gantt-bar-inprogress" style="left:${barStart*cellW}px;width:${barW}px;opacity:0.5">
            <span class="bar-label">${esc(phase.name)}</span>
          </div>`;
        }
      }
    }

    rowHtml += '</div>';
    return rowHtml;
  };

  // Match exact order of task list
  phases.forEach(phase => {
    const phaseTasks = tasks.filter(t => t.phaseId === phase.id && !t.parentId);
    const isExpanded = state.expandedPhases.has(phase.id);
    html += renderRow('phase', phase);
    if (isExpanded) {
      phaseTasks.forEach(task => {
        html += renderRow('task', task);
        const children = tasks.filter(t => t.parentId === task.id);
        children.forEach(child => html += renderRow('task', child, true));
      });
    }
  });

  const rootTasks = tasks.filter(t => !t.parentId && !t.phaseId);
  rootTasks.forEach(task => {
    html += renderRow('task', task);
    const children = tasks.filter(t => t.parentId === task.id);
    children.forEach(child => html += renderRow('task', child, true));
  });

  html += '</div>';
  container.innerHTML = html;

  // Sync scroll between task panel and chart body
  syncScroll();
}

// Sync scroll
let syncingScroll = false;
function syncScroll() {
  const taskPanel = document.getElementById('task-panel');
  const chartPanel = document.getElementById('chart-panel');
  taskPanel.addEventListener('scroll', () => {
    if (syncingScroll) return;
    syncingScroll = true;
    chartPanel.scrollTop = taskPanel.scrollTop;
    syncingScroll = false;
  });
  chartPanel.addEventListener('scroll', () => {
    if (syncingScroll) return;
    syncingScroll = true;
    taskPanel.scrollTop = chartPanel.scrollTop;
    syncingScroll = false;
  });
}

// ── SUMMARY ──
function renderSummary() {
  if (!state.currentProject) {
    document.getElementById('summary-content').innerHTML = '<div class="empty-state"><div class="icon">📊</div><div class="title">プロジェクトを選択してください</div></div>';
    return;
  }
  const tasks = getTasks().filter(t => !t.parentId); // top-level only for summary
  const allTasks = getTasks();
  const todayStr = today();

  const counts = { todo: 0, inprogress: 0, requested: 0, done: 0, cancelled: 0 };
  allTasks.forEach(t => counts[t.status] = (counts[t.status]||0) + 1);
  const total = allTasks.length;
  const doneRate = total ? Math.round(counts.done / total * 100) : 0;
  const totalEffort = allTasks.reduce((s,t) => s + (t.effort||1), 0);
  const doneEffort = allTasks.filter(t => t.status === 'done').reduce((s,t) => s + (t.effort||1), 0);

  // Overdue tasks
  const overdue = allTasks.filter(t => t.endDate < todayStr && t.status !== 'done' && t.status !== 'cancelled');
  // At-risk (end within 3 days, not done)
  const atRisk = allTasks.filter(t => {
    if (t.status === 'done' || t.status === 'cancelled') return false;
    const days = diffDays(todayStr, t.endDate);
    return days >= 0 && days <= 3;
  });

  const p = getProject();
  const projectProgress = (() => {
    const phases = getPhases();
    if (!phases.length) return [];
    return phases.map(ph => {
      const pTasks = allTasks.filter(t => t.phaseId === ph.id);
      const doneCount = pTasks.filter(t => t.status === 'done').length;
      const pct = pTasks.length ? Math.round(doneCount / pTasks.length * 100) : 0;
      const hasOverdue = pTasks.some(t => t.endDate < todayStr && t.status !== 'done' && t.status !== 'cancelled');
      return { phase: ph, total: pTasks.length, done: doneCount, pct, hasOverdue };
    });
  })();

  let html = `
    <h2 style="font-size:16px;font-weight:700;margin-bottom:16px;color:var(--text)">${esc(p.name)} — 進捗サマリー</h2>
    <div class="summary-grid">
      <div class="summary-card"><div class="card-label">総タスク数</div><div class="card-value accent">${total}</div></div>
      <div class="summary-card"><div class="card-label">完了率</div><div class="card-value green">${doneRate}%</div></div>
      <div class="summary-card"><div class="card-label">進行中</div><div class="card-value accent">${counts.inprogress}</div></div>
      <div class="summary-card"><div class="card-label">未着手</div><div class="card-value">${counts.todo}</div></div>
      <div class="summary-card"><div class="card-label">期限切れ</div><div class="card-value red">${overdue.length}</div></div>
      <div class="summary-card"><div class="card-label">総工数</div><div class="card-value orange">${totalEffort}h</div></div>
    </div>
  `;

  // Phase progress
  if (projectProgress.length) {
    html += `<div class="summary-section-title">フェーズ別進捗</div>`;
    projectProgress.forEach(pp => {
      html += `<div class="progress-item ${pp.pct < 30 && pp.hasOverdue ? 'danger' : pp.hasOverdue ? 'warning' : ''}">
        <div class="progress-info">
          <div class="task-title">${esc(pp.phase.name)}</div>
          <div class="task-meta">${pp.done}/${pp.total}タスク完了 · ${pp.phase.startDate} 〜 ${pp.phase.endDate}</div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" style="width:${pp.pct}%;background:${pp.pct>=80?'var(--green)':pp.pct>=50?'var(--accent)':'var(--orange)'}"></div>
          </div>
        </div>
        <div class="progress-pct">${pp.pct}%</div>
      </div>`;
    });
  }

  // Overdue tasks
  if (overdue.length) {
    html += `<div class="summary-section-title" style="color:var(--red)">⚠ 期限切れタスク (${overdue.length}件)</div>`;
    overdue.forEach(t => {
      const days = diffDays(t.endDate, todayStr);
      html += `<div class="progress-item danger" ondblclick="editTask('${t.id}')" style="cursor:pointer">
        <div class="progress-info">
          <div class="task-title">${esc(t.name)}</div>
          <div class="task-meta">${t.assignee||'未担当'} · 終了予定: ${t.endDate} (${days}日超過)</div>
          ${t.memo ? `<div class="task-meta" style="margin-top:3px">📝 ${esc(t.memo)}</div>` : ''}
        </div>
        <span class="badge badge-${t.status}">${STATUS_LABELS[t.status]}</span>
      </div>`;
    });
  }

  // At-risk tasks
  if (atRisk.length) {
    html += `<div class="summary-section-title" style="color:var(--orange)">⚡ 期限3日以内 (${atRisk.length}件)</div>`;
    atRisk.forEach(t => {
      const days = diffDays(todayStr, t.endDate);
      html += `<div class="progress-item warning" ondblclick="editTask('${t.id}')" style="cursor:pointer">
        <div class="progress-info">
          <div class="task-title">${esc(t.name)}</div>
          <div class="task-meta">${t.assignee||'未担当'} · 終了予定: ${t.endDate} (残${days}日)</div>
        </div>
        <span class="badge badge-${t.status}">${STATUS_LABELS[t.status]}</span>
      </div>`;
    });
  }

  document.getElementById('summary-content').innerHTML = html;
}

function exportCSV() {
  if (!state.currentProject) return alert('プロジェクトを選択してください');
  const p = getProject();
  const tasks = p.tasks;
  const headers = ['id','phaseId','parentId','name','startDate','endDate','completedDate','status','assignee','effort','memo','updatedAt'];
  const rows = [headers.join(',')];
  tasks.forEach(t => {
    rows.push(headers.map(h => {
      const v = t[h] || '';
      return `"${String(v).replace(/"/g,'""')}"`;
    }).join(','));
  });
  // Also export phases
  rows.push(''); rows.push('## PHASES ##');
  const phHeaders = ['id','name','startDate','endDate'];
  rows.push(phHeaders.join(','));
  p.phases.forEach(ph => {
    rows.push(phHeaders.map(h => `"${String(ph[h]||'').replace(/"/g,'""')}"`).join(','));
  });

  const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${p.name}_gantt_${today()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function importCSV(event) {
  if (!state.currentProject) return alert('プロジェクトを選択してください');
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const text = e.target.result;
      const lines = text.split('\n');
      const p = getProject();
      let mode = 'tasks';
      let headers = null;
      const newTasks = [];
      const newPhases = [];

      lines.forEach((line, i) => {
        line = line.trim();
        if (!line) return;
        if (line.startsWith('## PHASES ##')) { mode = 'phases'; headers = null; return; }
        const cols = parseCSVLine(line);
        if (!headers) { headers = cols; return; }
        if (mode === 'tasks') {
          const t = {};
          headers.forEach((h,i) => { t[h] = cols[i] || ''; });
          if (t.name) newTasks.push({
            id: t.id || 'task_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
            phaseId: t.phaseId || null,
            parentId: t.parentId || null,
            name: t.name,
            startDate: t.startDate || today(),
            endDate: t.endDate || addDays(today(),6),
            completedDate: t.completedDate || null,
            status: t.status || 'todo',
            assignee: t.assignee || '',
            effort: parseFloat(t.effort) || 1,
            memo: t.memo || '',
            updatedAt: t.updatedAt || today(),
          });
        } else {
          const ph = {};
          headers.forEach((h,i) => { ph[h] = cols[i] || ''; });
          if (ph.name) newPhases.push({
            id: ph.id || 'phase_' + Date.now(),
            name: ph.name,
            startDate: ph.startDate || today(),
            endDate: ph.endDate || addDays(today(),13),
          });
        }
      });

      if (confirm(`${newTasks.length}件のタスク、${newPhases.length}件のフェーズをインポートします。既存データと統合しますか？（「キャンセル」で置き換え）`)) {
        p.tasks = [...p.tasks, ...newTasks];
        p.phases = [...p.phases, ...newPhases];
      } else {
        p.tasks = newTasks;
        p.phases = newPhases;
      }
      save(); renderAll(); updateAssigneeFilter();
      alert('インポート完了');
    } catch(err) {
      alert('CSVの解析に失敗しました: ' + err.message);
    }
    event.target.value = '';
  };
  reader.readAsText(file, 'UTF-8');
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
      else inQuote = !inQuote;
    } else if (c === ',' && !inQuote) {
      result.push(cur); cur = '';
    } else cur += c;
  }
  result.push(cur);
  return result;
}

}
