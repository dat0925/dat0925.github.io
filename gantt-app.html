<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GANTT PRO</title>
<script src="https://cdn.jsdelivr.net/npm/encoding-japanese@2/encoding.min.js"></script>
<style>
:root {
  --bg:#f4f5f7;--s1:#ffffff;--s2:#f0f2f5;--s3:#e8eaed;
  --bd:#d0d5dd;--bd2:#b0b8c8;--tx:#1a2030;--tx2:#4a5568;--tx3:#8a96a8;
  --ac:#2563eb;--ac2:rgba(37,99,235,0.1);
  --gn:#16a34a;--or:#d97706;--rd:#dc2626;--pu:#7c3aed;
  --f:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;
  --fm:'SF Mono',Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--f);font-size:13px;overflow:hidden}
/* TOPBAR */
#topbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--s1);border-bottom:1px solid var(--bd);flex-wrap:wrap;flex-shrink:0}
.logo{font-family:var(--fm);font-size:13px;font-weight:600;color:var(--ac);letter-spacing:2px;white-space:nowrap}
.pjs{display:flex;gap:6px;align-items:center;flex:1;min-width:0;flex-wrap:wrap}
.pjs select,.pjs input{background:var(--s3);border:1px solid var(--bd2);color:var(--tx);padding:4px 8px;border-radius:5px;font-family:var(--f);font-size:12px;outline:none}
.pjs select{max-width:170px}.pjs input{width:120px}
.tbr{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.btn{padding:4px 10px;border-radius:5px;border:1px solid var(--bd2);background:var(--s3);color:var(--tx2);font-family:var(--f);font-size:11px;cursor:pointer;white-space:nowrap;transition:background .1s}
.btn:hover{background:var(--bd);color:var(--tx)}.btn.p{background:var(--ac);border-color:var(--ac);color:#fff}.btn.p:hover{opacity:.85}.btn.d{color:var(--rd)}
/* TABS */
#tabs{display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--s1);border-bottom:1px solid var(--bd);flex-wrap:wrap;flex-shrink:0}
.tg{display:flex;background:var(--s3);border-radius:6px;padding:2px;gap:2px}
.tab{padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px;color:var(--tx2);transition:all .1s;white-space:nowrap}
.tab.on{background:var(--ac);color:#fff}.tab:hover:not(.on){background:var(--bd);color:var(--tx)}
#tabs .sp{flex:1}.rc{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
/* FILTER */
.fb{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.fb input,.fb select{background:var(--s3);border:1px solid var(--bd2);color:var(--tx);padding:4px 7px;border-radius:5px;font-family:var(--f);font-size:11px;outline:none}
.fb input{width:110px}.fb select{min-width:80px}
/* BULK */
#bulk{display:none;align-items:center;gap:8px;padding:5px 12px;background:var(--ac2);border-bottom:1px solid var(--ac);flex-shrink:0}
#bulk.on{display:flex}#bulk select{background:var(--s3);border:1px solid var(--bd2);color:var(--tx);padding:3px 7px;border-radius:4px;font-family:var(--f);font-size:11px;outline:none}
.bc{font-size:11px;color:var(--ac);font-weight:600}
/* MAIN */
#main{display:flex;flex-direction:column;height:calc(100vh - 88px);overflow:hidden}
#gw{display:flex;flex:1;overflow:hidden;min-height:0}
/* TASK PANEL */
#tp{width:500px;min-width:500px;flex-shrink:0;display:flex;flex-direction:column;border-right:2px solid var(--bd2);background:var(--s1);overflow:hidden}
#tph{display:grid;grid-template-columns:24px 18px 12px 1fr 58px 58px 44px;align-items:center;padding:0 6px;height:34px;background:var(--s2);border-bottom:2px solid var(--bd2);flex-shrink:0;gap:3px}
#tph span{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
#tpb{flex:1;overflow-y:auto;overflow-x:hidden}
/* ROWS */
.ph-r{display:grid;grid-template-columns:24px 18px 12px 1fr 58px 58px 44px;align-items:center;padding:0 6px;height:32px;background:var(--s3);border-bottom:1px solid var(--bd);cursor:pointer;gap:3px;transition:background .1s}
.ph-r:hover{background:var(--bd)}
.t-r{display:grid;grid-template-columns:24px 18px 12px 1fr 58px 58px 44px;align-items:center;padding:0 6px;height:30px;border-bottom:1px solid var(--bd);gap:3px;cursor:pointer;transition:background .1s}
.t-r:hover{background:var(--s2)}.t-r.sel{background:var(--ac2)}.t-r.ch{padding-left:14px}
.sd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sd.todo{background:#5a6478}.sd.inprogress{background:#4f7fff}.sd.requested{background:#f59e0b}.sd.done{background:#22c55e}.sd.cancelled{background:#ef4444}
.tn{font-size:11px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.tn.dn{text-decoration:line-through;color:var(--tx3)}
.td{font-size:10px;color:var(--tx2);font-family:var(--fm);white-space:nowrap}
.ef{font-size:10px;color:var(--tx2);font-family:var(--fm);text-align:center}
.tog{display:flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:3px;color:var(--tx3);font-size:9px;cursor:pointer}
.tog:hover{background:var(--bd2);color:var(--tx2)}
.ptog{display:flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:3px;background:var(--bd2);color:var(--tx2);font-size:9px;transition:transform .15s}
.ptog.cl{transform:rotate(-90deg)}
.pn{font-size:11px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* CHART */
#cp{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#chw{flex-shrink:0;overflow:hidden;background:var(--s1)}
#chc{display:block}
#cbw{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}
#cbc{display:block}
/* SUMMARY */
#sv{display:none;flex:1;overflow-y:auto;padding:16px}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:16px}
.sc{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:12px}
.sl{font-size:10px;color:var(--tx3);margin-bottom:3px}.sv2{font-size:22px;font-weight:700;font-family:var(--fm)}
.sv2.ac{color:var(--ac)}.sv2.gn{color:var(--gn)}.sv2.or{color:var(--or)}.sv2.rd{color:var(--rd)}
.sst{font-size:12px;font-weight:600;color:var(--tx);margin:14px 0 7px;display:flex;align-items:center;gap:6px}
.sst::before{content:'';width:3px;height:12px;background:var(--ac);border-radius:2px}
.pi{background:var(--s1);border:1px solid var(--bd);border-radius:7px;padding:10px 12px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:start;gap:6px}
.pi.dng{border-color:var(--rd);background:rgba(239,68,68,.06)}.pi.wrn{border-color:var(--or);background:rgba(245,158,11,.06)}
.pi-t{font-size:11px;font-weight:500;color:var(--tx)}.pi-m{font-size:10px;color:var(--tx3);margin-top:2px}
.pb{height:3px;background:var(--bd);border-radius:2px;margin-top:5px}.pbf{height:3px;border-radius:2px}
.ppct{font-size:11px;font-family:var(--fm);color:var(--tx2);font-weight:600;flex-shrink:0}
.bdg{display:inline-flex;align-items:center;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;flex-shrink:0}
.bdg.todo{background:rgba(90,100,120,.3);color:#8892aa}.bdg.inprogress{background:var(--ac2);color:var(--ac)}
.bdg.requested{background:rgba(245,158,11,.15);color:var(--or)}.bdg.done{background:rgba(34,197,94,.15);color:var(--gn)}.bdg.cancelled{background:rgba(239,68,68,.15);color:var(--rd)}
/* MODAL */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:12px}
#ov.on{display:flex}
.mo{background:var(--s1);border:1px solid var(--bd2);border-radius:10px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.mh{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--bd)}
.mt{font-size:13px;font-weight:600}.mb{padding:14px 16px}.mf{display:flex;justify-content:flex-end;gap:8px;padding:12px 16px;border-top:1px solid var(--bd)}
.fl{display:block;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.fc{width:100%;background:var(--s3);border:1px solid var(--bd2);color:var(--tx);padding:6px 9px;border-radius:5px;font-family:var(--f);font-size:12px;outline:none;transition:border-color .1s}
.fc:focus{border-color:var(--ac)}.fc option{background:var(--s3)}
textarea.fc{min-height:60px;resize:vertical}.fg{margin-bottom:11px}.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* EMPTY */
.emp{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 16px;color:var(--tx3);gap:8px;text-align:center}
.emp .ic{font-size:36px;opacity:.3}.emp .et{font-size:13px;font-weight:600}.emp .ed{font-size:11px}
/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--s1)}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
/* MOBILE */
@media(max-width:700px){
  html,body{height:auto;overflow:auto}
  #main{height:auto;overflow:visible}
  #gw{flex-direction:column;height:auto;overflow:visible}
  #topbar,#tabs{position:relative}
  #tp{width:100%;min-width:0;border-right:none;border-bottom:2px solid var(--bd2);height:auto;overflow:visible}
  #tpb{overflow-y:auto;max-height:40vh}
  #cp{height:250px;min-height:250px;flex-shrink:0}
  #sv{height:auto}
  .pjs select{max-width:110px}.pjs input{width:85px}
  .fr{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="topbar">
  <div class="logo">◈ GANTT</div>
  <div class="pjs">
    <select id="pjsel" onchange="switchPJ(this.value)"><option value="">プロジェクト選択...</option></select>
    <input type="text" id="pjname" placeholder="新規プロジェクト名" maxlength="40">
    <button class="btn p" onclick="addPJ()">+ 作成</button>
  </div>
  <div class="tbr">
    <div class="fb">
      <input type="text" id="srch" placeholder="🔍 検索" oninput="renderAll()">
      <select id="fst" onchange="renderAll()"><option value="">全ステータス</option><option value="todo">未着手</option><option value="inprogress">進行中</option><option value="requested">依頼中</option><option value="done">完了</option><option value="cancelled">不用</option></select>
      <select id="fas" onchange="renderAll()"><option value="">全担当者</option></select>
    </div>
    <button class="btn" onclick="showAddTask()">+ タスク</button>
    <button class="btn" onclick="showAddPhase()">+ フェーズ</button>
    <button class="btn" onclick="document.getElementById('csi').click()">↑CSV</button>
    <input type="file" id="csi" accept=".csv" style="display:none" onchange="importCSV(event)">
    <button class="btn" onclick="exportCSV()">↓CSV</button>
    <button class="btn d" onclick="deletePJ()">🗑</button>
  </div>
</div>
<div id="tabs">
  <div class="tg">
    <div class="tab on" data-v="gantt" onclick="setView('gantt')">ガント</div>
    <div class="tab" data-v="summary" onclick="setView('summary')">サマリー</div>
  </div>
  <div class="sp"></div>
  <div class="rc">
    <div class="tg" id="sctabs">
      <div class="tab on" data-s="day" onclick="setScale('day')">日</div>
      <div class="tab" data-s="week" onclick="setScale('week')">週</div>
      <div class="tab" data-s="month" onclick="setScale('month')">月</div>
    </div>
    <button class="btn" onclick="goToday()">Today</button>
    <button class="btn" onclick="nav(-1)">◀</button>
    <button class="btn" onclick="nav(1)">▶</button>
  </div>
</div>
<div id="bulk">
  <span class="bc" id="bcc">0件選択</span>
  <select id="bst"><option value="">ステータス変更...</option><option value="todo">未着手</option><option value="inprogress">進行中</option><option value="requested">依頼中</option><option value="done">完了</option><option value="cancelled">不用</option></select>
  <button class="btn p" onclick="applyBulk()">適用</button>
  <button class="btn" onclick="clearSel()">解除</button>
</div>
<div id="main">
  <div id="gw">
    <div id="tp">
      <div id="tph">
        <span><input type="checkbox" id="chkall" onchange="toggleAll(this)" style="accent-color:var(--ac);width:13px;height:13px"></span>
        <span></span><span></span><span>タスク名</span><span>開始</span><span>終了</span><span>工数h</span>
      </div>
      <div id="tpb"></div>
    </div>
    <div id="cp">
      <div id="chw"><canvas id="chc"></canvas></div>
      <div id="cbw"><canvas id="cbc"></canvas></div>
    </div>
  </div>
  <div id="sv"></div>
</div>
<div id="ov">
  <div class="mo">
    <div class="mh"><span class="mt" id="mtitle">タスク追加</span><button class="btn" onclick="closeM()" style="padding:2px 8px;font-size:14px">✕</button></div>
    <div class="mb" id="mbody"></div>
    <div class="mf"><button class="btn" onclick="closeM()">キャンセル</button><button class="btn p" onclick="subM()">保存</button></div>
  </div>
</div>
<script>
const SL={todo:'未着手',inprogress:'進行中',requested:'依頼中',done:'完了',cancelled:'不用'};
const SC={todo:'#5a6478',inprogress:'#4f7fff',requested:'#f59e0b',done:'#22c55e',cancelled:'#ef4444'};
const SBG={todo:'#e2e8f0',inprogress:'#dbeafe',requested:'#fef3c7',done:'#dcfce7',cancelled:'#fee2e2'};
const DN=['日','月','火','水','木','金','土'];
const HOLS=new Set(['2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-03-20','2025-04-29','2025-05-03','2025-05-04','2025-05-05','2025-07-21','2025-08-11','2025-09-15','2025-09-22','2025-09-23','2025-10-13','2025-11-03','2025-11-23','2025-11-24','2025-12-23','2026-01-01','2026-01-12','2026-02-11','2026-02-23','2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-07-20','2026-08-11','2026-09-21','2026-09-22','2026-09-23','2026-10-12','2026-11-03','2026-11-23','2026-12-23']);
const ROW=30,PHROW=32,HDR=36;
let S={pjs:{},cur:null,view:'gantt',scale:'day',sd:null,sel:new Set(),exp:new Set()};
let mMode=null,mId=null;

// DATE
function td(){return ds(new Date())}
function ds(d){return d.toISOString().split('T')[0]}
function pd(s){return s?new Date(s+'T00:00:00'):null}
function fmt(s){if(!s)return'';const d=pd(s);return`${d.getMonth()+1}/${d.getDate()}`}
function addD(s,n){const d=pd(s);d.setDate(d.getDate()+n);return ds(d)}
function diffD(a,b){return Math.round((pd(b)-pd(a))/86400000)}

// STORAGE
function save(){try{localStorage.setItem('gp4',JSON.stringify(S.pjs));localStorage.setItem('gp4c',S.cur||'')}catch(e){}}
function load(){try{const d=localStorage.getItem('gp4');if(d)S.pjs=JSON.parse(d);S.cur=localStorage.getItem('gp4c')||null;if(S.cur&&!S.pjs[S.cur])S.cur=null}catch(e){S.pjs={}}}
function pj(){return S.cur?S.pjs[S.cur]:null}
function tasks(){return pj()?.tasks||[]}
function phases(){return pj()?.phases||[]}

// PROJECT
function addPJ(){
  const n=document.getElementById('pjname').value.trim();
  if(!n)return alert('プロジェクト名を入力してください');
  const id='pj_'+Date.now();
  S.pjs[id]={name:n,tasks:[],phases:[]};
  document.getElementById('pjname').value='';
  save();renderPJS();switchPJ(id);
}
function switchPJ(id){
  S.cur=id||null;S.sel.clear();S.exp.clear();
  if(id)phases().forEach(p=>S.exp.add(p.id));
  save();renderPJS();updateFAs();renderAll();
}
function deletePJ(){
  if(!S.cur)return;
  if(!confirm(`「${pj().name}」を削除しますか？`))return;
  delete S.pjs[S.cur];S.cur=null;save();renderPJS();renderAll();
}
function renderPJS(){
  const sel=document.getElementById('pjsel');
  sel.innerHTML='<option value="">プロジェクト選択...</option>';
  Object.entries(S.pjs).forEach(([id,p])=>{
    const o=document.createElement('option');
    o.value=id;o.textContent=p.name;if(id===S.cur)o.selected=true;sel.appendChild(o);
  });
}

// CHART CONFIG
function getDays(){
  const n=S.scale==='day'?90:S.scale==='week'?180:365;
  const start=S.sd||addD(td(),-7);
  const days=[];for(let i=0;i<n;i++)days.push(addD(start,i));
  return{days,start};
}
function cw(){return S.scale==='day'?28:S.scale==='week'?14:7}
function goToday(){S.sd=addD(td(),-7);drawChart()}
function nav(d){const n=S.scale==='day'?30:S.scale==='week'?60:90;S.sd=addD(S.sd||addD(td(),-7),d*n);drawChart()}
function setScale(s){S.scale=s;document.querySelectorAll('#sctabs .tab').forEach(t=>t.classList.toggle('on',t.dataset.s===s));drawChart()}

// ROWS
function getRows(){
  const ts=filtered();const phs=phases();const rows=[];
  phs.forEach(ph=>{
    rows.push({type:'ph',data:ph});
    if(S.exp.has(ph.id)){
      ts.filter(t=>t.phaseId===ph.id&&!t.parentId).forEach(t=>{
        rows.push({type:'t',data:t});
        if(S.exp.has('c_'+t.id))ts.filter(c=>c.parentId===t.id).forEach(c=>rows.push({type:'t',data:c,ch:true}));
      });
    }
  });
  ts.filter(t=>!t.phaseId&&!t.parentId).forEach(t=>{
    rows.push({type:'t',data:t});
    if(S.exp.has('c_'+t.id))ts.filter(c=>c.parentId===t.id).forEach(c=>rows.push({type:'t',data:c,ch:true}));
  });
  return rows;
}
function filtered(){
  const ts=tasks();
  const q=(document.getElementById('srch')?.value||'').toLowerCase();
  const fs=document.getElementById('fst')?.value||'';
  const fa=document.getElementById('fas')?.value||'';
  return ts.filter(t=>{
    if(q&&!t.name.toLowerCase().includes(q))return false;
    if(fs&&t.status!==fs)return false;
    if(fa&&t.assignee!==fa)return false;
    return true;
  });
}
function updateFAs(){
  const as=[...new Set(tasks().map(t=>t.assignee).filter(Boolean))];
  const sel=document.getElementById('fas');const cv=sel.value;
  sel.innerHTML='<option value="">全担当者</option>';
  as.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;if(a===cv)o.selected=true;sel.appendChild(o)});
}

// RENDER TASK PANEL
function renderTP(){
  const b=document.getElementById('tpb');
  if(!S.cur){b.innerHTML='<div class="emp"><div class="ic">📋</div><div class="et">プロジェクトを選択してください</div></div>';return}
  const rows=getRows();
  if(!rows.length){b.innerHTML='<div class="emp"><div class="ic">✅</div><div class="et">タスクがありません</div><div class="ed">「+ タスク」から追加してください</div></div>';return}
  b.innerHTML=rows.map(r=>r.type==='ph'?renderPHR(r.data):renderTR(r.data,r.ch)).join('');
}
function renderPHR(ph){
  const ts=filtered().filter(t=>t.phaseId===ph.id);
  const exp=S.exp.has(ph.id);
  const eff=ts.reduce((s,t)=>s+(t.effort||1),0);
  return`<div class="ph-r" onclick="togPh('${ph.id}')" ondblclick="editPh('${ph.id}');event.stopPropagation()"><span></span><span class="ptog ${exp?'':'cl'}">▾</span><span></span><span class="pn">${esc(ph.name)}</span><span class="td">${fmt(ph.startDate)}</span><span class="td">${fmt(ph.endDate)}</span><span class="ef">${eff}h</span></div>`;
}
function renderTR(t,ch=false){
  const sel=S.sel.has(t.id);
  const hasC=tasks().some(c=>c.parentId===t.id);
  const exp=S.exp.has('c_'+t.id);
  return`<div class="t-r${ch?' ch':''}${sel?' sel':''}" ondblclick="editTask('${t.id}')">
    <span><input type="checkbox"${sel?' checked':''} style="accent-color:var(--ac);width:13px;height:13px" onclick="event.stopPropagation();togSel('${t.id}',this.checked)"></span>
    <span class="tog" onclick="event.stopPropagation();${hasC?`togC('${t.id}')`:`showAddTask('${t.id}')`}">${hasC?(exp?'▾':'▸'):'+'}</span>
    <span><span class="sd ${t.status}"></span></span>
    <span style="overflow:hidden;display:flex;align-items:center"><span class="tn${t.status==='done'?' dn':''}" title="${esc(t.name)}">${esc(t.name)}</span></span>
    <span class="td">${fmt(t.startDate)}</span>
    <span class="td">${fmt(t.endDate)}</span>

// CANVAS CHART
function drawChart(){drawHdr();drawBody()}
function drawHdr(){
  const{days}=getDays();const W=days.length*cw();
  const c=document.getElementById('chc');
  const dpr=window.devicePixelRatio||1;
  c.width=W*dpr;c.height=HDR*dpr;c.style.width=W+'px';c.style.height=HDR+'px';
  document.getElementById('chw').style.height=HDR+'px';
  const ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  ctx.fillStyle='#f0f2f5';ctx.fillRect(0,0,W,HDR);
  // month labels
  let mx=0,cm=null,ms=0;
  days.forEach((d,i)=>{
    const dt=pd(d);const m=`${dt.getFullYear()}年${dt.getMonth()+1}月`;
    if(m!==cm){if(cm)drawML(ctx,ms,i,cw(),cm);cm=m;ms=i;}
  });
  if(cm)drawML(ctx,ms,days.length,cw(),cm);
  // day cells
  const today=td();
  days.forEach((d,i)=>{
    const dt=pd(d);const x=i*cw();const w=cw();
    const isT=d===today,isWE=dt.getDay()===0||dt.getDay()===6,isH=HOLS.has(d);
    if(isT){ctx.fillStyle='rgba(220,38,38,0.1)';ctx.fillRect(x,16,w,HDR-16);}
    else if(isH){ctx.fillStyle='rgba(217,119,6,0.08)';ctx.fillRect(x,16,w,HDR-16);}
    else if(isWE){ctx.fillStyle='rgba(124,58,237,0.05)';ctx.fillRect(x,16,w,HDR-16);}
    ctx.strokeStyle='#d0d5dd';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(x+w,16);ctx.lineTo(x+w,HDR);ctx.stroke();
    if(w>=14){
      ctx.font='500 9px -apple-system,sans-serif';ctx.textAlign='center';
      ctx.fillStyle=isT?'#dc2626':isH?'#d97706':isWE?'#7c3aed':'#8a96a8';
      ctx.fillText(dt.getDate(),x+w/2,27);
      if(w>=22){ctx.fillStyle=isT?'#dc2626':isH?'#d97706':isWE?'#7c3aed':'#b0b8c8';ctx.fillText(DN[dt.getDay()],x+w/2,HDR-4);}
    }
  });
  ctx.strokeStyle='#b0b8c8';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,HDR-.75);ctx.lineTo(W,HDR-.75);ctx.stroke();
}
function drawML(ctx,si,ei,w,label){
  const x=si*w,ww=(ei-si)*w;
  ctx.strokeStyle='#d0d5dd';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(x+ww,0);ctx.lineTo(x+ww,16);ctx.stroke();
  ctx.font='600 10px -apple-system,sans-serif';ctx.fillStyle='#4a5568';ctx.textAlign='left';
  ctx.fillText(label.length>8?label.replace('年','年\n'):label,x+5,12);
}
function drawBody(){
  const{days}=getDays();const W=days.length*cw();
  const rows=getRows();
  const H=rows.reduce((s,r)=>s+(r.type==='ph'?PHROW:ROW),0)||ROW;
  const c=document.getElementById('cbc');
  const dpr=window.devicePixelRatio||1;
  c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px';
  const ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  // day index map
  const di={};days.forEach((d,i)=>di[d]=i);
  const today=td();
  // col backgrounds
  days.forEach((d,i)=>{
    const dt=pd(d);const x=i*cw();const w=cw();
    const isT=d===today,isWE=dt.getDay()===0||dt.getDay()===6,isH=HOLS.has(d);
    if(isT){ctx.fillStyle='rgba(220,38,38,0.04)';ctx.fillRect(x,0,w,H);}
    else if(isH){ctx.fillStyle='rgba(217,119,6,0.04)';ctx.fillRect(x,0,w,H);}
    else if(isWE){ctx.fillStyle='rgba(124,58,237,0.03)';ctx.fillRect(x,0,w,H);}
  });
  // grid
  ctx.strokeStyle='#e2e8f0';ctx.lineWidth=.5;
  days.forEach((_,i)=>{const x=i*cw()+cw();ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();});
  // rows
  let y=0;
  rows.forEach(r=>{
    const rh=r.type==='ph'?PHROW:ROW;
    if(r.type==='ph'){ctx.fillStyle='#eef0f3';ctx.fillRect(0,y,W,rh);}
    ctx.strokeStyle='#e2e8f0';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(0,y+rh);ctx.lineTo(W,y+rh);ctx.stroke();
    if(r.type==='t'){
      const t=r.data;
      if(t.startDate&&t.endDate){
        const si2=di[t.startDate]!==undefined?di[t.startDate]:(t.startDate<days[0]?0:days.length);
        const ei2=di[t.endDate]!==undefined?di[t.endDate]:(t.endDate>days[days.length-1]?days.length-1:-1);
        if(ei2>=0&&si2<days.length&&ei2>=si2){
          const bx=si2*cw(),bw=Math.max(cw()/2,(ei2-si2+1)*cw()),bh=14,by2=y+(rh-bh)/2;
          ctx.fillStyle=SBG[t.status]||'#252c3d';rr(ctx,bx,by2,bw,bh,3);ctx.fill();
          ctx.fillStyle=SC[t.status]||'#4f7fff';rr(ctx,bx,by2,Math.min(bw,5),bh,3);ctx.fill();
          if(bw>28){
            ctx.font='500 9px -apple-system,sans-serif';ctx.fillStyle='rgba(26,32,48,0.85)';ctx.textAlign='left';
            ctx.save();ctx.beginPath();ctx.rect(bx+7,by2,bw-10,bh);ctx.clip();
            ctx.fillText(t.name,bx+7,by2+bh/2+3.5);ctx.restore();
          }
        }
      }
      if(t.completedDate){
        const ci=di[t.completedDate];
        if(ci!==undefined){
          const cx2=ci*cw()+cw()/2,cy2=y+rh/2;
          ctx.save();ctx.translate(cx2,cy2);ctx.rotate(Math.PI/4);
          ctx.fillStyle='#22c55e';ctx.fillRect(-4,-4,8,8);ctx.restore();
        }
      }
    } else {
      const ph=r.data;
      if(ph.startDate&&ph.endDate){
        const si2=di[ph.startDate]!==undefined?di[ph.startDate]:(ph.startDate<days[0]?0:days.length);
        const ei2=di[ph.endDate]!==undefined?di[ph.endDate]:(ph.endDate>days[days.length-1]?days.length-1:-1);
        if(ei2>=0&&si2<days.length&&ei2>=si2){
          const bx=si2*cw(),bw=(ei2-si2+1)*cw(),bh=10,by2=y+(rh-bh)/2;
          ctx.fillStyle='rgba(37,99,235,0.12)';rr(ctx,bx,by2,bw,bh,2);ctx.fill();
          ctx.strokeStyle='rgba(37,99,235,0.3)';ctx.lineWidth=1;rr(ctx,bx,by2,bw,bh,2);ctx.stroke();
        }
      }
    }
    y+=rh;
  });
  // today line
  const ti=di[today];
  if(ti!==undefined){
    const tx2=ti*cw()+cw()/2;
    ctx.strokeStyle='rgba(220,38,38,0.7)';ctx.lineWidth=1.5;
    ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(tx2,0);ctx.lineTo(tx2,H);ctx.stroke();ctx.setLineDash([]);
  }
}
function rr(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

// CSV
function exportCSV(){
  if(!S.cur)return alert('プロジェクトを選択してください');
  const p=pj();
  const hd=['id','phaseId','parentId','name','startDate','endDate','completedDate','status','assignee','effort','memo','updatedAt'];
  const rows=[hd.join(',')];
  p.tasks.forEach(t=>rows.push(hd.map(h=>`"${String(t[h]||'').replace(/"/g,'""')}"`).join(',')));
  rows.push('','## PHASES ##','id,name,startDate,endDate');
  p.phases.forEach(ph=>rows.push(['id','name','startDate','endDate'].map(h=>`"${String(ph[h]||'').replace(/"/g,'""')}"`).join(',')));
  const csv=rows.join('\n');
  // Encoding.js でShift-JIS変換
  if(typeof Encoding!=='undefined'){
    const arr=Encoding.stringToCode(csv);
    const sjis=Encoding.convert(arr,{to:'SJIS',from:'UNICODE'});
    const blob=new Blob([new Uint8Array(sjis)],{type:'text/csv;charset=shift_jis'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${p.name}_${td()}.csv`;a.click();
  } else {
    // フォールバック: UTF-8 BOM付き（Excelで開ける）
    const bom=new Uint8Array([0xEF,0xBB,0xBF]);
    const body=new TextEncoder().encode(csv);
    const merged=new Uint8Array(bom.length+body.length);
    merged.set(bom);merged.set(body,bom.length);
    const blob=new Blob([merged],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${p.name}_${td()}.csv`;a.click();
  }
}
function importCSV(ev){
  if(!S.cur)return alert('プロジェクトを選択してください');
  const file=ev.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const lines=e.target.result.split('\n');let mode='tasks',hd=null;const nt=[],np=[];
      lines.forEach(line=>{
        line=line.trim();if(!line)return;
        if(line.startsWith('## PHASES ##')){mode='phases';hd=null;return;}
        const cols=parseCSVL(line);if(!hd){hd=cols;return;}
        if(mode==='tasks'&&cols[3]){const t={};hd.forEach((h,i)=>t[h]=cols[i]||'');nt.push({id:t.id||'t_'+Date.now()+Math.random().toString(36).slice(2),phaseId:t.phaseId||null,parentId:t.parentId||null,name:t.name,startDate:t.startDate||td(),endDate:t.endDate||addD(td(),6),completedDate:t.completedDate||null,status:t.status||'todo',assignee:t.assignee||'',effort:parseFloat(t.effort)||1,memo:t.memo||'',updatedAt:t.updatedAt||td()});}
        else if(mode==='phases'&&cols[1]){np.push({id:cols[0]||'ph_'+Date.now(),name:cols[1],startDate:cols[2]||td(),endDate:cols[3]||addD(td(),13)});}
      });
      const p=pj();
      if(confirm(`${nt.length}件タスク、${np.length}件フェーズ。追加統合しますか？（キャンセル=置き換え）`)){p.tasks=[...p.tasks,...nt];p.phases=[...p.phases,...np];}
      else{p.tasks=nt;p.phases=np;}
      save();updateFAs();renderAll();alert('インポート完了');
    }catch(err){alert('CSVエラー: '+err.message);}
    ev.target.value='';
  };
  r.readAsText(file,'Shift-JIS');
}
function parseCSVL(line){
  const res=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(c===','&&!inQ){res.push(cur);cur='';}else cur+=c;}
  res.push(cur);return res;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// INIT
function init(){
  load();
  if(Object.keys(S.pjs).length===0)createDemo();
  if(S.cur)phases().forEach(p=>S.exp.add(p.id));
  S.sd=addD(td(),-7);
  renderPJS();updateFAs();renderAll();
  initSync();
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM()});
  document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)closeM()});
}
init();
