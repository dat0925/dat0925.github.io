<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>GANTT PRO</title>
<script src="https://cdn.jsdelivr.net/npm/encoding-japanese@2/encoding.min.js"></script>
<style>
:root{
  --bg:#f4f5f7;--s1:#fff;--s2:#f0f2f5;--s3:#e8eaed;
  --bd:#d0d5dd;--bd2:#b0b8c8;--tx:#1a2030;--tx2:#4a5568;--tx3:#8a96a8;
  --ac:#2563eb;--ac2:rgba(37,99,235,.1);
  --gn:#16a34a;--or:#d97706;--rd:#dc2626;--pu:#7c3aed;
  --f:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;
  --fm:'SF Mono',Menlo,Consolas,monospace;
  --row:34px;--phrow:34px;--hdr:52px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--f);font-size:13px;overflow:hidden}
/* TOPBAR */
#topbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--s1);border-bottom:1px solid var(--bd);flex-wrap:wrap;flex-shrink:0}
.logo{font-family:var(--fm);font-size:13px;font-weight:600;color:var(--ac);letter-spacing:2px;white-space:nowrap}
.pjs{display:flex;gap:6px;align-items:center;flex:1;min-width:0;flex-wrap:wrap}
.pjs select,.pjs input[type=text]{background:var(--s3);border:1px solid var(--bd2);color:var(--tx);padding:4px 8px;border-radius:5px;font-family:var(--f);font-size:12px;outline:none}
.pjs select{max-width:170px}.pjs input[type=text]{width:120px}
.tbr{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.btn{padding:4px 10px;border-radius:5px;border:1px solid var(--bd2);background:var(--s3);color:var(--tx2);font-family:var(--f);font-size:11px;cursor:pointer;white-space:nowrap;transition:background .1s,color .1s}
.btn:hover{background:var(--bd);color:var(--tx)}.btn.p{background:var(--ac);border-color:var(--ac);color:#fff}.btn.p:hover{opacity:.85}.btn.d{color:var(--rd)}
/* TABS */
#tabs{display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--s1);border-bottom:1px solid var(--bd);flex-wrap:wrap;flex-shrink:0}
.tg{display:flex;background:var(--s3);border-radius:6px;padding:2px;gap:2px}
.tab{padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px;color:var(--tx2);transition:all .1s;white-space:nowrap}
.tab.on{background:var(--ac);color:#fff}.tab:hover:not(.on){background:var(--bd);color:var(--tx)}
#tabs .sp{flex:1}.rc{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
/* FILTER */
.fb{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.fb input,.fb select{background:var(--s3);border:1px solid var(--bd2);color:var(--tx);padding:4px 7px;border-radius:5px;font-family:var(--f);font-size:11px;outline:none}
.fb input{width:110px}.fb select{min-width:80px}
/* BULK */
#bulk{display:none;align-items:center;gap:8px;padding:5px 12px;background:var(--ac2);border-bottom:1px solid var(--ac);flex-shrink:0}
#bulk.on{display:flex}
#bulk select{background:var(--s3);border:1px solid var(--bd2);color:var(--tx);padding:3px 7px;border-radius:4px;font-family:var(--f);font-size:11px;outline:none}
.bc{font-size:11px;color:var(--ac);font-weight:600}
/* MAIN */
#main{display:flex;flex-direction:column;height:calc(100vh - 84px);overflow:hidden}
#gw{display:flex;flex:1;overflow:hidden;min-height:0}
/* TASK PANEL */
#tp{width:600px;min-width:600px;flex-shrink:0;display:flex;flex-direction:column;border-right:2px solid var(--bd2);background:var(--s1);overflow:hidden}
#tph{display:grid;grid-template-columns:18px 20px 14px 1fr 54px 52px 52px 42px 24px 22px;align-items:center;padding:0 6px;height:34px;background:var(--s2);border-bottom:2px solid var(--bd2);flex-shrink:0;gap:3px}
#tph span{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;user-select:none}
#tpb{flex:1;overflow-y:auto;overflow-x:hidden;position:relative}
/* ROWS */
.ph-r,.t-r{display:grid;gap:3px;align-items:center;padding:0 6px;border-bottom:1px solid var(--bd);user-select:none;position:relative}
.ph-r{grid-template-columns:18px 20px 14px 1fr 54px 52px 52px 42px 24px 22px;height:var(--phrow);background:var(--s3);cursor:pointer;transition:background .1s}
.ph-r:hover{background:var(--bd)}
.t-r{grid-template-columns:18px 20px 14px 1fr 54px 52px 52px 42px 24px 22px;height:var(--row);transition:background .1s;cursor:default}
.t-r:hover{background:var(--s2)}.t-r.sel{background:var(--ac2)!important}
.t-r.ch{padding-left:16px;grid-template-columns:18px 20px 14px 1fr 54px 52px 52px 42px 24px 22px}
/* drag ghost */
.t-r.dragging{opacity:.4;background:var(--ac2)!important}
.drop-line{height:2px;background:var(--ac);margin:0 6px;border-radius:1px}
/* inline add row */
.add-row{display:grid;grid-template-columns:20px 24px 14px 1fr 60px 55px 60px 40px 26px;gap:3px;align-items:center;padding:0 6px;height:34px;border-bottom:1px solid var(--bd);background:#f0f6ff}
.add-row input{background:var(--s1);border:1px solid var(--ac);color:var(--tx);padding:3px 5px;border-radius:4px;font-family:var(--f);font-size:11px;outline:none;width:100%}
.add-row input[type=date]{font-size:10px}
/* STATUS BADGE inline */
.stbdg{display:inline-flex;align-items:center;padding:1px 5px;border-radius:10px;font-size:9px;font-weight:700;cursor:pointer;white-space:nowrap}
.stbdg.todo{background:rgba(90,100,120,.2);color:#5a6478}
.stbdg.inprogress{background:rgba(37,99,235,.15);color:#2563eb}
.stbdg.requested{background:rgba(217,119,6,.15);color:#d97706}
.stbdg.done{background:rgba(22,163,74,.15);color:#16a34a}
.stbdg.cancelled{background:rgba(220,38,38,.15);color:#dc2626}
/* status popup */
.st-popup{position:fixed;background:var(--s1);border:1px solid var(--bd2);border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:300;min-width:100px;overflow:hidden}
.st-popup div{padding:6px 12px;font-size:11px;cursor:pointer;transition:background .1s}
.st-popup div:hover{background:var(--s2)}
/* icons */
.tog{display:flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;color:var(--tx2);font-size:14px;cursor:pointer;font-weight:700}
.tog:hover{background:var(--bd2);color:var(--ac)}
.ptog{display:flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;background:var(--bd);color:var(--tx2);font-size:14px;font-weight:700;transition:transform .15s;cursor:pointer}
.ptog.cl{transform:rotate(-90deg)}
.drag-handle{display:flex;align-items:center;justify-content:center;width:18px;height:22px;color:var(--tx3);font-size:12px;cursor:grab;letter-spacing:-2px}
.drag-handle:hover{color:var(--tx2)}
.drag-handle:active{cursor:grabbing}
.sd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sd.todo{background:#8a96a8}.sd.inprogress{background:#2563eb}.sd.requested{background:#d97706}.sd.done{background:#16a34a}.sd.cancelled{background:#dc2626}
.tn{font-size:12px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.tn.dn{text-decoration:line-through;color:var(--tx3)}
.td{font-size:11px;color:var(--tx2);font-family:var(--fm);white-space:nowrap;overflow:hidden}
.ef{font-size:11px;color:var(--tx2);font-family:var(--fm);text-align:center}
.pn{font-size:12px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ic-btn{display:flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;cursor:pointer;font-size:12px;color:var(--tx3);border:none;background:none;flex-shrink:0}
.ic-btn:hover{background:var(--bd2);color:var(--ac)}
/* CHART */
#cp{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#chw{flex-shrink:0;overflow-x:hidden;overflow-y:hidden;background:var(--s1)}
#chc{display:block}
#cbw{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}
#cbc{display:block}
/* SUMMARY */
#sv{display:none;flex:1;overflow-y:auto;padding:16px}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:16px}
.sc{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:12px}
.sl{font-size:10px;color:var(--tx3);margin-bottom:3px}.sv2{font-size:22px;font-weight:700;font-family:var(--fm)}
.sv2.ac{color:var(--ac)}.sv2.gn{color:var(--gn)}.sv2.or{color:var(--or)}.sv2.rd{color:var(--rd)}
.sst{font-size:12px;font-weight:600;color:var(--tx);margin:14px 0 7px;display:flex;align-items:center;gap:6px}
.sst::before{content:'';width:3px;height:12px;background:var(--ac);border-radius:2px}
.pi{background:var(--s1);border:1px solid var(--bd);border-radius:7px;padding:10px 12px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:start;gap:6px}
.pi.dng{border-color:var(--rd);background:rgba(220,38,38,.06)}.pi.wrn{border-color:var(--or);background:rgba(217,119,6,.06)}
.pi-t{font-size:11px;font-weight:500;color:var(--tx)}.pi-m{font-size:10px;color:var(--tx3);margin-top:2px}
.pb{height:3px;background:var(--bd);border-radius:2px;margin-top:5px}.pbf{height:3px;border-radius:2px}
.ppct{font-size:11px;font-family:var(--fm);color:var(--tx2);font-weight:600;flex-shrink:0}
.bdg{display:inline-flex;align-items:center;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;flex-shrink:0}
.bdg.todo{background:rgba(90,100,120,.25);color:#5a6478}.bdg.inprogress{background:var(--ac2);color:var(--ac)}
.bdg.requested{background:rgba(217,119,6,.15);color:var(--or)}.bdg.done{background:rgba(22,163,74,.15);color:var(--gn)}.bdg.cancelled{background:rgba(220,38,38,.15);color:var(--rd)}
/* MODAL */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;align-items:center;justify-content:center;padding:12px}
#ov.on{display:flex}
.mo{background:var(--s1);border:1px solid var(--bd2);border-radius:10px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.mh{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--bd)}
.mt{font-size:13px;font-weight:600}.mb{padding:14px 16px}.mf{display:flex;justify-content:flex-end;gap:8px;padding:12px 16px;border-top:1px solid var(--bd)}
.fl{display:block;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.fc{width:100%;background:var(--s3);border:1px solid var(--bd2);color:var(--tx);padding:6px 9px;border-radius:5px;font-family:var(--f);font-size:12px;outline:none;transition:border-color .1s}
.fc:focus{border-color:var(--ac)}.fc option{background:var(--s3)}
textarea.fc{min-height:60px;resize:vertical}.fg{margin-bottom:11px}.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* EMPTY */
.emp{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 16px;color:var(--tx3);gap:8px;text-align:center}
.emp .ic{font-size:36px;opacity:.3}.emp .et{font-size:13px;font-weight:600}.emp .ed{font-size:11px}
/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--s1)}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
/* MOBILE */
@media(max-width:700px){
  html,body{height:auto;overflow:auto}
  #main{height:auto;overflow:visible}
  #gw{flex-direction:column;height:auto;overflow:visible}
  #topbar,#tabs{position:relative}
  #tp{width:100%;min-width:0;border-right:none;border-bottom:2px solid var(--bd2);height:auto;overflow:visible}
  #tpb{overflow-y:auto;max-height:45vh}
  #cp{height:260px;min-height:260px;flex-shrink:0}
  #sv{height:auto}
  .pjs select{max-width:110px}.pjs input[type=text]{width:85px}
  .fr{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="topbar">
  <div class="logo">◈ GANTT</div>
  <div class="pjs">
    <select id="pjsel" onchange="switchPJ(this.value)"><option value="">プロジェクト選択...</option></select>
    <input type="text" id="pjname" placeholder="新規プロジェクト名" maxlength="40">
    <button class="btn p" onclick="addPJ()">+ 作成</button>
  </div>
  <div class="tbr">
    <div class="fb">
      <input type="text" id="srch" placeholder="🔍 検索" oninput="renderAll()">
      <select id="fst" onchange="renderAll()"><option value="">全ステータス</option><option value="todo">未着手</option><option value="inprogress">進行中</option><option value="requested">依頼中</option><option value="done">完了</option><option value="cancelled">不用</option></select>
      <select id="fas" onchange="renderAll()"><option value="">全担当者</option></select>
    </div>
    <button class="btn" onclick="showAddTask()">+ タスク</button>
    <button class="btn" onclick="showAddPhase()">+ フェーズ</button>
    <button class="btn" onclick="document.getElementById('csi').click()">↑CSV</button>
    <input type="file" id="csi" accept=".csv" style="display:none" onchange="importCSV(event)">
    <button class="btn" onclick="exportCSV()">↓CSV</button>
    <button class="btn d" onclick="deletePJ()">🗑</button>
  </div>
</div>
<div id="tabs">
  <div class="tg">
    <div class="tab on" data-v="gantt" onclick="setView('gantt')">ガント</div>
    <div class="tab" data-v="summary" onclick="setView('summary')">サマリー</div>
  </div>
  <!-- 一括操作: 常時表示 -->
  <div id="bulk-inline" style="display:flex;align-items:center;gap:5px;margin-left:8px">
    <span class="bc" id="bcc" style="font-size:11px;color:var(--tx3);white-space:nowrap">0件選択</span>
    <select id="bst" style="background:var(--s3);border:1px solid var(--bd2);color:var(--tx);padding:3px 6px;border-radius:4px;font-family:var(--f);font-size:11px;outline:none"><option value="">ステータス変更</option><option value="todo">未着手</option><option value="inprogress">進行中</option><option value="requested">依頼中</option><option value="done">完了</option><option value="cancelled">不用</option></select>
    <button class="btn p" style="padding:3px 8px;font-size:11px" onclick="applyBulk()">適用</button>
    <button class="btn" style="padding:3px 8px;font-size:11px" onclick="clearSel()">解除</button>
  </div>
  <div class="sp"></div>
  <div class="rc">
    <div class="tg" id="sctabs">
      <div class="tab on" data-s="day" onclick="setScale('day')">日</div>
      <div class="tab" data-s="week" onclick="setScale('week')">週</div>
      <div class="tab" data-s="month" onclick="setScale('month')">月</div>
    </div>
    <button class="btn" onclick="goToday()">Today</button>
    <button class="btn" onclick="nav(-1)">◀</button>
    <button class="btn" onclick="nav(1)">▶</button>
  </div>
</div>
<div id="main">
  <div id="gw">
    <div id="tp">
      <div id="tph">
        <span></span><!-- drag -->
        <span><input type="checkbox" id="chkall" onchange="toggleAll(this)" style="accent-color:var(--ac);width:13px;height:13px"></span>
        <span></span><!-- expand/+ -->
        <span>タスク名</span>
        <span>ステータス</span>
        <span>開始</span><span>終了</span><span>工数h</span>
        <span>✏</span><span>⧉</span>
      </div>
      <div id="tpb"></div>
    </div>
    <div id="cp">
      <div id="chw"><canvas id="chc"></canvas></div>
      <div id="cbw"><canvas id="cbc"></canvas></div>
    </div>
  </div>
  <div id="sv"></div>
</div>
<!-- STATUS POPUP -->
<div class="st-popup" id="stpop" style="display:none">
  <div onclick="setStatus('todo')">⚪ 未着手</div>
  <div onclick="setStatus('inprogress')">🔵 進行中</div>
  <div onclick="setStatus('requested')">🟡 依頼中</div>
  <div onclick="setStatus('done')">🟢 完了</div>
  <div onclick="setStatus('cancelled')">🔴 不用</div>
</div>
<div id="ov">
  <div class="mo">
    <div class="mh"><span class="mt" id="mtitle">タスク追加</span><button class="btn" onclick="closeM()" style="padding:2px 8px;font-size:14px">✕</button></div>
    <div class="mb" id="mbody"></div>
    <div class="mf"><button class="btn" onclick="closeM()">キャンセル</button><button class="btn p" onclick="subM()">保存</button></div>
  </div>
</div>
<script>
// ══════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════
const SL={todo:'未着手',inprogress:'進行中',requested:'依頼中',done:'完了',cancelled:'不用'};
const SC={todo:'#8a96a8',inprogress:'#2563eb',requested:'#d97706',done:'#16a34a',cancelled:'#dc2626'};
const SBG={todo:'#e2e8f0',inprogress:'#dbeafe',requested:'#fef3c7',done:'#dcfce7',cancelled:'#fee2e2'};
const SACC={todo:'#5a6478',inprogress:'#1d4ed8',requested:'#b45309',done:'#15803d',cancelled:'#b91c1c'};
const DN=['日','月','火','水','木','金','土'];
const HOLS=new Set(['2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-03-20','2025-04-29','2025-05-03','2025-05-04','2025-05-05','2025-07-21','2025-08-11','2025-09-15','2025-09-22','2025-09-23','2025-10-13','2025-11-03','2025-11-23','2025-11-24','2025-12-23','2026-01-01','2026-01-12','2026-02-11','2026-02-23','2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-07-20','2026-08-11','2026-09-21','2026-09-22','2026-09-23','2026-10-12','2026-11-03','2026-11-23','2026-12-23']);
const ROW=34,PHROW=34,HDR=52;

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let S={pjs:{},cur:null,view:'gantt',scale:'day',sd:null,sel:new Set(),exp:new Set()};
let mMode=null,mId=null;
let stPopTarget=null; // task id for status popup
// chart drag
let cdrag={active:false,taskId:null,mode:null,startX:0,origStart:null,origEnd:null};
// row drag
let rdrag={active:false,taskId:null,startY:0,ghostEl:null,dropIdx:-1};

// ══════════════════════════════════════════
// DATE UTILS
// ══════════════════════════════════════════
function td(){return ds(new Date())}
function ds(d){return d.toISOString().split('T')[0]}
function pd(s){return s?new Date(s+'T00:00:00'):null}
function fmt(s){if(!s)return'';const d=pd(s);return`${d.getMonth()+1}/${d.getDate()}`}
function addD(s,n){const d=pd(s);d.setDate(d.getDate()+n);return ds(d)}
function diffD(a,b){return Math.round((pd(b)-pd(a))/86400000)}

// ══════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════
function save(){try{localStorage.setItem('gp5',JSON.stringify(S.pjs));localStorage.setItem('gp5c',S.cur||'')}catch(e){}}
function load(){
  try{
    // migrate from old keys
    const old=localStorage.getItem('gp4');
    if(old&&!localStorage.getItem('gp5')){localStorage.setItem('gp5',old);}
    const d=localStorage.getItem('gp5');if(d)S.pjs=JSON.parse(d);
    S.cur=localStorage.getItem('gp5c')||localStorage.getItem('gp4c')||null;
    if(S.cur&&!S.pjs[S.cur])S.cur=null;
  }catch(e){S.pjs={};}
}
function pj(){return S.cur?S.pjs[S.cur]:null}
function tasks(){return pj()?.tasks||[]}
function phases(){return pj()?.phases||[]}

// ══════════════════════════════════════════
// PROJECT
// ══════════════════════════════════════════
function addPJ(){
  const n=document.getElementById('pjname').value.trim();
  if(!n)return alert('プロジェクト名を入力してください');
  const id='pj_'+Date.now();
  S.pjs[id]={name:n,tasks:[],phases:[]};
  document.getElementById('pjname').value='';
  save();renderPJS();switchPJ(id);
}
function switchPJ(id){
  S.cur=id||null;S.sel.clear();S.exp.clear();
  if(id)phases().forEach(p=>S.exp.add(p.id));
  save();renderPJS();updateFAs();renderAll();
}
function deletePJ(){
  if(!S.cur)return;
  if(!confirm(`「${pj().name}」を削除しますか？`))return;
  delete S.pjs[S.cur];S.cur=null;save();renderPJS();renderAll();
}
function renderPJS(){
  const sel=document.getElementById('pjsel');
  sel.innerHTML='<option value="">プロジェクト選択...</option>';
  Object.entries(S.pjs).forEach(([id,p])=>{

function getRows(){
  const ts=filtered();const phs=phases();const rows=[];
  phs.forEach(ph=>{
    rows.push({type:'ph',data:ph});
    if(S.exp.has(ph.id)){
      ts.filter(t=>t.phaseId===ph.id&&!t.parentId).forEach(t=>{
        rows.push({type:'t',data:t,ch:false});
        if(S.exp.has('c_'+t.id))
          ts.filter(c=>c.parentId===t.id).forEach(c=>rows.push({type:'t',data:c,ch:true}));
      });
    }
  });
  ts.filter(t=>!t.phaseId&&!t.parentId).forEach(t=>{
    rows.push({type:'t',data:t,ch:false});
    if(S.exp.has('c_'+t.id))
      ts.filter(c=>c.parentId===t.id).forEach(c=>rows.push({type:'t',data:c,ch:true}));
  });
  return rows;
}
function filtered(){
  const ts=tasks();
  const q=(document.getElementById('srch')?.value||'').toLowerCase();
  const fs=document.getElementById('fst')?.value||'';
  const fa=document.getElementById('fas')?.value||'';
  return ts.filter(t=>{
    if(q&&!t.name.toLowerCase().includes(q))return false;
    if(fs&&t.status!==fs)return false;
    if(fa&&t.assignee!==fa)return false;
    return true;
  });
}
function updateFAs(){
  const as=[...new Set(tasks().map(t=>t.assignee).filter(Boolean))];
  const sel=document.getElementById('fas');const cv=sel.value;
  sel.innerHTML='<option value="">全担当者</option>';
  as.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;if(a===cv)o.selected=true;sel.appendChild(o)});
}

// ══════════════════════════════════════════
// ROW DRAG (sort tasks)
// ══════════════════════════════════════════
function attachRowDragEvents(){
  document.querySelectorAll('.drag-handle[data-drag-id]').forEach(el=>{
    el.addEventListener('mousedown',rowDragStart);
    el.addEventListener('touchstart',rowDragStartTouch,{passive:false});
  });
}

let rdropLine=null;
function rowDragStart(e){
  const id=e.currentTarget.dataset.dragId;
  if(!id)return;
  e.preventDefault();
  rdrag.active=true;rdrag.taskId=id;rdrag.startY=e.clientY;
  document.querySelector(`#tr_${id}`)?.classList.add('dragging');
  document.addEventListener('mousemove',rowDragMove);
  document.addEventListener('mouseup',rowDragEnd);
}
function rowDragStartTouch(e){
  const id=e.currentTarget.dataset.dragId;
  if(!id)return;
  e.preventDefault();
  rdrag.active=true;rdrag.taskId=id;rdrag.startY=e.touches[0].clientY;
  document.querySelector(`#tr_${id}`)?.classList.add('dragging');
  document.addEventListener('touchmove',rowDragMoveTouch,{passive:false});
  document.addEventListener('touchend',rowDragEnd);
}
function rowDragMove(e){if(!rdrag.active)return;updateDropIndicator(e.clientY);}
function rowDragMoveTouch(e){if(!rdrag.active)return;e.preventDefault();updateDropIndicator(e.touches[0].clientY);}

function updateDropIndicator(clientY){
  const tpb=document.getElementById('tpb');
  const rect=tpb.getBoundingClientRect();
  const relY=clientY-rect.top+tpb.scrollTop;
  // find target row
  const rows=document.querySelectorAll('#tpb .t-r,#tpb .ph-r');
  let targetIdx=-1,targetEl=null;
  let cumY=0;
  for(const row of rows){
    const rh=row.classList.contains('ph-r')?PHROW:ROW;
    if(relY<cumY+rh/2){targetEl=row;break;}
    cumY+=rh;targetIdx++;
  }
  // remove old drop line
  if(rdropLine){rdropLine.remove();rdropLine=null;}
  if(targetEl){
    rdropLine=document.createElement('div');rdropLine.className='drop-line';
    targetEl.before(rdropLine);
    rdrag.dropEl=targetEl;
  } else {
    rdrag.dropEl=null;
  }
}

function rowDragEnd(){
  if(!rdrag.active)return;
  document.removeEventListener('mousemove',rowDragMove);
  document.removeEventListener('mouseup',rowDragEnd);
  document.removeEventListener('touchmove',rowDragMoveTouch);
  document.removeEventListener('touchend',rowDragEnd);
  if(rdropLine){rdropLine.remove();rdropLine=null;}
  document.querySelector(`#tr_${rdrag.taskId}`)?.classList.remove('dragging');

  if(rdrag.dropEl&&rdrag.taskId){
    const p=pj();if(!p){rdrag.active=false;return;}
    const srcIdx=p.tasks.findIndex(t=>t.id===rdrag.taskId);
    const dropId=rdrag.dropEl.dataset.id;
    const dropType=rdrag.dropEl.dataset.type;

    if(dropType==='t'&&srcIdx>=0){
      const dstIdx=p.tasks.findIndex(t=>t.id===dropId);
      if(srcIdx>=0&&dstIdx>=0&&srcIdx!==dstIdx){
        const srcTask=p.tasks.splice(srcIdx,1)[0];
        const newDstIdx=p.tasks.findIndex(t=>t.id===dropId);
        p.tasks.splice(newDstIdx,0,srcTask);
        // 親子付け替え: ドロップ先が子タスクなら同じ親に
        const dstTask=p.tasks.find(t=>t.id===dropId);
        if(dstTask&&dstTask.parentId){
          srcTask.parentId=dstTask.parentId;
          srcTask.phaseId=dstTask.phaseId;
        } else if(dstTask&&!dstTask.parentId){
          // ドロップ先がルートタスクの場合は親を解除
          // ただし既に子タスクだった場合のみ確認
          if(srcTask.parentId){
            srcTask.parentId=null;
            srcTask.phaseId=dstTask.phaseId;
          }
        }
      }
    } else if(dropType==='ph'){
      // フェーズ行にドロップ → そのフェーズに移動
      if(srcIdx>=0){
        const srcTask=p.tasks[srcIdx];
        srcTask.phaseId=dropId;
        srcTask.parentId=null;
      }
    }
    save();
  }
  rdrag.active=false;rdrag.taskId=null;rdrag.dropEl=null;
  renderAll();
}

// ══════════════════════════════════════════
// PARENT/CHILD TOGGLE
// ══════════════════════════════════════════
function togPh(id){S.exp.has(id)?S.exp.delete(id):S.exp.add(id);renderTP();drawBody();}
function togC(id){const k='c_'+id;S.exp.has(k)?S.exp.delete(k):S.exp.add(k);renderTP();drawBody();}

function toggleParentChild(taskId){
  const p=pj();if(!p)return;
  const t=p.tasks.find(x=>x.id===taskId);if(!t)return;
  if(t.parentId){
    // 子→親へ昇格
    t.parentId=null;
  } else {
    // 親→子へ: 直前のタスクを親にする
    const rows=getRows();
    const idx=rows.findIndex(r=>r.type==='t'&&r.data.id===taskId);
    if(idx>0){
      const prev=rows[idx-1];
      if(prev.type==='t'&&!prev.data.parentId){
        t.parentId=prev.data.id;
        t.phaseId=prev.data.phaseId;
      }
    }
  }
  save();renderAll();
}

// CANVAS CHART
// ══════════════════════════════════════════
function drawChart(){drawHdr();drawBody();}

function drawHdr(){
  const{days}=getDays();const W=days.length*cw();
  const c=document.getElementById('chc');
  const dpr=window.devicePixelRatio||1;
  const M_H=17,D_H=18,W_H=17;
  c.width=W*dpr;c.height=HDR*dpr;c.style.width=W+'px';c.style.height=HDR+'px';
  document.getElementById('chw').style.height=HDR+'px';
  const ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  ctx.fillStyle='#f0f2f5';ctx.fillRect(0,0,W,HDR);
  // month row
  let cm=null,ms=0;
  days.forEach((d,i)=>{
    const dt=pd(d);const m=`${dt.getFullYear()}年${dt.getMonth()+1}月`;
    if(m!==cm){if(cm)drawML(ctx,ms,i,cw(),cm,M_H);cm=m;ms=i;}
  });
  if(cm)drawML(ctx,ms,days.length,cw(),cm,M_H);
  ctx.strokeStyle='#d0d5dd';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,M_H);ctx.lineTo(W,M_H);ctx.stroke();
  // day/dow row
  const today=td();
  days.forEach((d,i)=>{
    const dt=pd(d);const x=i*cw();const w=cw();
    const isT=d===today,isWE=dt.getDay()===0||dt.getDay()===6,isH=HOLS.has(d);
    if(isT){ctx.fillStyle='rgba(220,38,38,.10)';ctx.fillRect(x,M_H,w,D_H+W_H);}
    else if(isH){ctx.fillStyle='rgba(217,119,6,.08)';ctx.fillRect(x,M_H,w,D_H+W_H);}
    else if(isWE){ctx.fillStyle='rgba(124,58,237,.05)';ctx.fillRect(x,M_H,w,D_H+W_H);}
    ctx.strokeStyle='#d0d5dd';ctx.lineWidth=.5;
    ctx.beginPath();ctx.moveTo(x+w,M_H);ctx.lineTo(x+w,HDR);ctx.stroke();
    if(w>=10){
      const dc=isT?'#dc2626':isH?'#d97706':isWE?'#7c3aed':'#374151';
      const wc=isT?'#dc2626':isH?'#d97706':isWE?'#7c3aed':'#9ca3af';
      ctx.textAlign='center';
      ctx.font='600 11px -apple-system,sans-serif';ctx.fillStyle=dc;
      ctx.fillText(dt.getDate(),x+w/2,M_H+D_H-4);
      if(w>=18){ctx.font='500 10px -apple-system,sans-serif';ctx.fillStyle=wc;ctx.fillText(DN[dt.getDay()],x+w/2,M_H+D_H+W_H-4);}
    }
  });
  ctx.strokeStyle='#d0d5dd';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(0,M_H+D_H);ctx.lineTo(W,M_H+D_H);ctx.stroke();
  ctx.strokeStyle='#b0b8c8';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,HDR-.75);ctx.lineTo(W,HDR-.75);ctx.stroke();
}
function drawML(ctx,si,ei,w,label,mh){
  const x=si*w,ww=(ei-si)*w;
  ctx.strokeStyle='#d0d5dd';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(x+ww,0);ctx.lineTo(x+ww,mh);ctx.stroke();
  ctx.font='700 11px -apple-system,sans-serif';ctx.fillStyle='#374151';ctx.textAlign='left';
  ctx.fillText(label,x+6,mh-4);
}

function drawBody(){
  const{days}=getDays();const W=days.length*cw();
  // include inline add row in height
  const rows=getRows();
  const extraRows=inlineAddParent!==null?1:0;
  const H=rows.reduce((s,r)=>s+(r.type==='ph'?PHROW:ROW),0)+(extraRows*34)||ROW;
  const c=document.getElementById('cbc');
  const dpr=window.devicePixelRatio||1;
  c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px';
  const ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  const di={};days.forEach((d,i)=>di[d]=i);
  const today=td();
  // col bg
  days.forEach((d,i)=>{
    const dt=pd(d);const x=i*cw();const w=cw();
    const isT=d===today,isWE=dt.getDay()===0||dt.getDay()===6,isH=HOLS.has(d);
    if(isT){ctx.fillStyle='rgba(220,38,38,.04)';ctx.fillRect(x,0,w,H);}
    else if(isH){ctx.fillStyle='rgba(217,119,6,.04)';ctx.fillRect(x,0,w,H);}
    else if(isWE){ctx.fillStyle='rgba(124,58,237,.03)';ctx.fillRect(x,0,w,H);}
  });
  // grid
  ctx.strokeStyle='#e2e8f0';ctx.lineWidth=.5;
  days.forEach((_,i)=>{const x=i*cw()+cw();ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();});
  // rows
  let y=0;
  rows.forEach(r=>{
    const rh=r.type==='ph'?PHROW:ROW;
    if(r.type==='ph'){ctx.fillStyle='#eef0f3';ctx.fillRect(0,y,W,rh);}
    ctx.strokeStyle='#e2e8f0';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(0,y+rh);ctx.lineTo(W,y+rh);ctx.stroke();
    if(r.type==='t'){
      const t=r.data;
      // auto-calc dates if has children
      const children2=tasks().filter(c=>c.parentId===t.id);
      let drawStart=t.startDate,drawEnd=t.endDate;
      if(children2.length){
        const ss=children2.map(c=>c.startDate).filter(Boolean).sort();
        const ee=children2.map(c=>c.endDate).filter(Boolean).sort();
        if(ss.length)drawStart=ss[0];
        if(ee.length)drawEnd=ee[ee.length-1];
      }
      if(drawStart&&drawEnd){
        const si=di[drawStart]!==undefined?di[drawStart]:(drawStart<days[0]?0:days.length);
        const ei=di[drawEnd]!==undefined?di[drawEnd]:(drawEnd>days[days.length-1]?days.length-1:-1);
        if(ei>=0&&si<days.length&&ei>=si){
          const bx=si*cw(),bw=Math.max(cw()/2,(ei-si+1)*cw()),bh=18,by=y+(rh-bh)/2;
          ctx.fillStyle=SBG[t.status]||'#e2e8f0';rr(ctx,bx,by,bw,bh,3);ctx.fill();
          ctx.fillStyle=SC[t.status]||'#8a96a8';rr(ctx,bx,by,Math.min(bw,5),bh,3);ctx.fill();
          if(bw>30){
            ctx.font='500 10px -apple-system,sans-serif';ctx.fillStyle='rgba(26,32,48,.85)';ctx.textAlign='left';
            ctx.save();ctx.beginPath();ctx.rect(bx+8,by,bw-12,bh);ctx.clip();
            ctx.fillText(t.name,bx+8,by+bh/2+3.5);ctx.restore();
          }
        }
      }
      if(t.completedDate){
        const ci=di[t.completedDate];
        if(ci!==undefined){
          const cx=ci*cw()+cw()/2,cy=y+rh/2;
          ctx.save();ctx.translate(cx,cy);ctx.rotate(Math.PI/4);
          ctx.fillStyle='#16a34a';ctx.fillRect(-5,-5,10,10);ctx.restore();
        }
      }
    } else {
      const ph=r.data;
      // auto-calc phase dates
      const phTasks=tasks().filter(t=>t.phaseId===ph.id&&!t.parentId);
      let phStart=ph.startDate,phEnd=ph.endDate;
      if(phTasks.length){
        const ss=phTasks.map(t=>t.startDate).filter(Boolean).sort();
        const ee=phTasks.map(t=>t.endDate).filter(Boolean).sort();
        if(ss.length)phStart=ss[0];
        if(ee.length)phEnd=ee[ee.length-1];
      }
      if(phStart&&phEnd){
        const si=di[phStart]!==undefined?di[phStart]:(phStart<days[0]?0:days.length);
        const ei=di[phEnd]!==undefined?di[phEnd]:(phEnd>days[days.length-1]?days.length-1:-1);
        if(ei>=0&&si<days.length&&ei>=si){
          const bx=si*cw(),bw=(ei-si+1)*cw(),bh=13,by=y+(rh-bh)/2;
          ctx.fillStyle='rgba(37,99,235,.12)';rr(ctx,bx,by,bw,bh,2);ctx.fill();
          ctx.strokeStyle='rgba(37,99,235,.3)';ctx.lineWidth=1;rr(ctx,bx,by,bw,bh,2);ctx.stroke();
        }
      }
    }
    y+=rh;
  });
  // today line
  const ti=di[today];
  if(ti!==undefined){
    const tx=ti*cw()+cw()/2;
    ctx.strokeStyle='rgba(220,38,38,.7)';ctx.lineWidth=1.5;
    ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(tx,0);ctx.lineTo(tx,H);ctx.stroke();ctx.setLineDash([]);
  }
}
function rr(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

// ══════════════════════════════════════════
// CANVAS CHART DRAG (bar resize/move)
// ══════════════════════════════════════════
function initChartDrag(){
  const canvas=document.getElementById('cbc');
  const wrap=document.getElementById('cbw');
  canvas.addEventListener('mousemove',e=>{
    if(cdrag.active){
      const dx=e.clientX-cdrag.startX;
      const dd=Math.round(dx/cw());
      const p=pj();if(!p)return;
      const t=p.tasks.find(t=>t.id===cdrag.taskId);if(!t)return;
      if(cdrag.mode==='move'){
        const dur=diffD(cdrag.origStart,cdrag.origEnd);
        t.startDate=addD(cdrag.origStart,dd);t.endDate=addD(t.startDate,dur);
      } else if(cdrag.mode==='left'){
        const ns=addD(cdrag.origStart,dd);if(ns<=cdrag.origEnd)t.startDate=ns;
      } else {
        const ne=addD(cdrag.origEnd,dd);if(ne>=cdrag.origStart)t.endDate=ne;
      }
      drawBody();
      // sync task panel dates inline
      const row=document.getElementById('tr_'+cdrag.taskId);
      if(row){const tds=row.querySelectorAll('.td');if(tds.length>=2){tds[0].textContent=fmt(t.startDate);tds[1].textContent=fmt(t.endDate);}}
      return;
    }
    const rect=canvas.getBoundingClientRect();
    const x=e.clientX-rect.left+wrap.scrollLeft;
    const y=e.clientY-rect.top+wrap.scrollTop;
    const row=getRowAtCanvasY(y);
    if(row&&row.type==='t'){
      const info=getBarInfo(row.data);
      if(info&&x>=info.bx&&x<=info.bx+info.bw){
        canvas.style.cursor=x<=info.bx+8||x>=info.bx+info.bw-8?'ew-resize':'grab';
      } else canvas.style.cursor='default';
    } else canvas.style.cursor='default';
  });
  canvas.addEventListener('mousedown',e=>{
    const rect=canvas.getBoundingClientRect();
    const x=e.clientX-rect.left+wrap.scrollLeft;
    const y=e.clientY-rect.top+wrap.scrollTop;
    const row=getRowAtCanvasY(y);
    if(!row||row.type!=='t')return;
    const info=getBarInfo(row.data);
    if(!info||x<info.bx||x>info.bx+info.bw)return;
    e.preventDefault();
    cdrag.active=true;cdrag.taskId=row.data.id;cdrag.startX=e.clientX;
    cdrag.origStart=row.data.startDate;cdrag.origEnd=row.data.endDate;
    cdrag.mode=x<=info.bx+8?'left':x>=info.bx+info.bw-8?'right':'move';
    canvas.style.cursor=cdrag.mode==='move'?'grabbing':'ew-resize';
  });
  const endCDrag=()=>{
    if(!cdrag.active)return;
    cdrag.active=false;
    const p=pj();
    if(p){const t=p.tasks.find(t=>t.id===cdrag.taskId);if(t)t.updatedAt=td();save();}
    renderAll();canvas.style.cursor='default';
  };
  document.addEventListener('mouseup',endCDrag);
  // touch
  canvas.addEventListener('touchstart',e=>{
    const touch=e.touches[0];
    const rect=canvas.getBoundingClientRect();
    const x=touch.clientX-rect.left+wrap.scrollLeft;
    const y=touch.clientY-rect.top+wrap.scrollTop;
    const row=getRowAtCanvasY(y);
    if(!row||row.type!=='t')return;
    const info=getBarInfo(row.data);
    if(!info||x<info.bx||x>info.bx+info.bw)return;
    e.preventDefault();
    cdrag.active=true;cdrag.taskId=row.data.id;cdrag.startX=touch.clientX;
    cdrag.origStart=row.data.startDate;cdrag.origEnd=row.data.endDate;
    cdrag.mode=x<=info.bx+10?'left':x>=info.bx+info.bw-10?'right':'move';
  },{passive:false});
  canvas.addEventListener('touchmove',e=>{
    if(!cdrag.active)return;e.preventDefault();
    const touch=e.touches[0];
    const dx=touch.clientX-cdrag.startX;const dd=Math.round(dx/cw());
    const p=pj();if(!p)return;
    const t=p.tasks.find(t=>t.id===cdrag.taskId);if(!t)return;
    if(cdrag.mode==='move'){const dur=diffD(cdrag.origStart,cdrag.origEnd);t.startDate=addD(cdrag.origStart,dd);t.endDate=addD(t.startDate,dur);}
    else if(cdrag.mode==='left'){const ns=addD(cdrag.origStart,dd);if(ns<=cdrag.origEnd)t.startDate=ns;}
    else{const ne=addD(cdrag.origEnd,dd);if(ne>=cdrag.origStart)t.endDate=ne;}
    drawBody();
  },{passive:false});
  canvas.addEventListener('touchend',endCDrag,{passive:true});
}
function getRowAtCanvasY(y){
  const rows=getRows();let cy=0;
  for(const r of rows){const rh=r.type==='ph'?PHROW:ROW;if(y>=cy&&y<cy+rh)return r;cy+=rh;}
  return null;
}
function getBarInfo(t){
  const{days}=getDays();const w=cw();
  const di={};days.forEach((d,i)=>di[d]=i);
  const si=di[t.startDate]!==undefined?di[t.startDate]:(t.startDate<days[0]?0:days.length);
  const ei=di[t.endDate]!==undefined?di[t.endDate]:(t.endDate>days[days.length-1]?days.length-1:-1);
  if(ei<0||si>=days.length)return null;
  return{bx:si*w,bw:Math.max(w/2,(ei-si+1)*w)};
}

function subM(){if(mMode==='addTask'||mMode==='editTask')subTask();else subPh();}
function subTask(){
  const name=document.getElementById('fn').value.trim();if(!name)return alert('タスク名を入力してください');
  const s=document.getElementById('fsd').value,e=document.getElementById('fed').value;
  if(!s||!e)return alert('日付を入力してください');

  const p=pj();

  else{const i=p.tasks.findIndex(x=>x.id===mId);if(i>=0)p.tasks[i]=t;}

function subPh(){
  const name=document.getElementById('fn').value.trim();if(!name)return alert('フェーズ名を入力してください');

function dupTask(id){
  const p=pj();if(!p)return;
  const t=p.tasks.find(t=>t.id===id);if(!t)return;
  const nt={...t,id:'t_'+Date.now()+'_'+Math.random().toString(36).slice(2,5),name:t.name+' (複製)',completedDate:null,status:t.status==='done'?'todo':t.status,updatedAt:td()};
  const idx=p.tasks.findIndex(x=>x.id===id);
  p.tasks.splice(idx+1,0,nt);

}

// SUMMARY
// ══════════════════════════════════════════
function renderSummary(){
  const sv=document.getElementById('sv');
  if(!S.cur){sv.innerHTML='<div class="emp"><div class="ic">📊</div><div class="et">プロジェクトを選択してください</div></div>';return;}
  const ts=tasks(),today=td();
  const cnt={todo:0,inprogress:0,requested:0,done:0,cancelled:0};
  ts.forEach(t=>cnt[t.status]=(cnt[t.status]||0)+1);
  const total=ts.length,rate=total?Math.round(cnt.done/total*100):0;
  const eff=ts.reduce((s,t)=>s+(t.effort||1),0);
  const ov=ts.filter(t=>t.endDate<today&&t.status!=='done'&&t.status!=='cancelled');
  const rk=ts.filter(t=>{if(t.status==='done'||t.status==='cancelled')return false;const d=diffD(today,t.endDate);return d>=0&&d<=3;});
  const phs=phases();
  let h=`<h2 style="font-size:14px;font-weight:700;margin-bottom:12px">${esc(pj().name)} — 進捗サマリー</h2>
  <div class="sg">
    <div class="sc"><div class="sl">総タスク</div><div class="sv2 ac">${total}</div></div>
    <div class="sc"><div class="sl">完了率</div><div class="sv2 gn">${rate}%</div></div>
    <div class="sc"><div class="sl">進行中</div><div class="sv2 ac">${cnt.inprogress}</div></div>
    <div class="sc"><div class="sl">未着手</div><div class="sv2">${cnt.todo}</div></div>
    <div class="sc"><div class="sl">期限切れ</div><div class="sv2 rd">${ov.length}</div></div>
    <div class="sc"><div class="sl">総工数</div><div class="sv2 or">${eff}h</div></div>
  </div>`;
  if(phs.length){
    h+='<div class="sst">フェーズ別進捗</div>';
    phs.forEach(ph=>{
      const pt=ts.filter(t=>t.phaseId===ph.id);
      const done=pt.filter(t=>t.status==='done').length;
      const pct=pt.length?Math.round(done/pt.length*100):0;
      const hov=pt.some(t=>t.endDate<today&&t.status!=='done'&&t.status!=='cancelled');
      const cls=pct<30&&hov?'dng':hov?'wrn':'';
      const col=pct>=80?'#16a34a':pct>=50?'#2563eb':'#d97706';
      h+=`<div class="pi ${cls}"><div style="flex:1"><div class="pi-t">${esc(ph.name)}</div><div class="pi-m">${done}/${pt.length}件完了 · ${ph.startDate}〜${ph.endDate}</div><div class="pb"><div class="pbf" style="width:${pct}%;background:${col}"></div></div></div><div class="ppct">${pct}%</div></div>`;
    });
  }
  if(ov.length){
    h+=`<div class="sst" style="color:#dc2626">⚠ 期限切れ(${ov.length}件)</div>`;
    ov.forEach(t=>{h+=`<div class="pi dng" style="cursor:pointer" ondblclick="editTask('${t.id}')"><div><div class="pi-t">${esc(t.name)}</div><div class="pi-m">${t.assignee||'未担当'} · ${t.endDate}</div></div><span class="bdg ${t.status}">${SL[t.status]}</span></div>`;});
  }
  if(rk.length){
    h+=`<div class="sst" style="color:#d97706">⚡ 期限3日以内(${rk.length}件)</div>`;
    rk.forEach(t=>{h+=`<div class="pi wrn" style="cursor:pointer" ondblclick="editTask('${t.id}')"><div><div class="pi-t">${esc(t.name)}</div><div class="pi-m">${t.assignee||'未担当'} · ${t.endDate}</div></div><span class="bdg ${t.status}">${SL[t.status]}</span></div>`;});
  }
  sv.innerHTML=h;
}

// ══════════════════════════════════════════
// CSV
// ══════════════════════════════════════════
function exportCSV(){
  if(!S.cur)return alert('プロジェクトを選択してください');
  const p=pj();
  const hd=['id','phaseId','parentId','name','startDate','endDate','completedDate','status','assignee','effort','memo','updatedAt'];
  const rows=[hd.join(',')];
  p.tasks.forEach(t=>rows.push(hd.map(h=>`"${String(t[h]||'').replace(/"/g,'""')}"`).join(',')));
  rows.push('','## PHASES ##','id,name,startDate,endDate');
  p.phases.forEach(ph=>rows.push(['id','name','startDate','endDate'].map(h=>`"${String(ph[h]||'').replace(/"/g,'""')}"`).join(',')));
  const csv=rows.join('\n');
  if(typeof Encoding!=='undefined'){
    const sjis=Encoding.convert(Encoding.stringToCode(csv),{to:'SJIS',from:'UNICODE'});
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([new Uint8Array(sjis)],{type:'text/csv;charset=shift_jis'}));a.download=`${p.name}_${td()}.csv`;a.click();
  } else {
    const bom=new Uint8Array([0xEF,0xBB,0xBF]);const body=new TextEncoder().encode(csv);
    const m=new Uint8Array(bom.length+body.length);m.set(bom);m.set(body,bom.length);
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([m],{type:'text/csv;charset=utf-8'}));a.download=`${p.name}_${td()}.csv`;a.click();
  }
}
function importCSV(ev){
  if(!S.cur)return alert('プロジェクトを選択してください');
  const file=ev.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const lines=e.target.result.split('\n');let mode='tasks',hd=null;const nt=[],np=[];
      lines.forEach(line=>{
        line=line.trim();if(!line)return;
        if(line.startsWith('## PHASES ##')){mode='phases';hd=null;return;}
        const cols=parseCSVL(line);if(!hd){hd=cols;return;}
        if(mode==='tasks'&&cols[3]){const t={};hd.forEach((h,i)=>t[h]=cols[i]||'');nt.push({id:t.id||'t_'+Date.now()+Math.random().toString(36).slice(2),phaseId:t.phaseId||null,parentId:t.parentId||null,name:t.name,startDate:t.startDate||td(),endDate:t.endDate||addD(td(),6),completedDate:t.completedDate||null,status:t.status||'todo',assignee:t.assignee||'',effort:parseFloat(t.effort)||1,memo:t.memo||'',updatedAt:t.updatedAt||td()});}
        else if(mode==='phases'&&cols[1]){np.push({id:cols[0]||'ph_'+Date.now(),name:cols[1],startDate:cols[2]||td(),endDate:cols[3]||addD(td(),13)});}
      });
      const p=pj();
      if(confirm(`${nt.length}件タスク、${np.length}件フェーズ。追加統合しますか？（キャンセル=置き換え）`)){p.tasks=[...p.tasks,...nt];p.phases=[...p.phases,...np];}
      else{p.tasks=nt;p.phases=np;}
      save();updateFAs();renderAll();alert('インポート完了');
    }catch(err){alert('CSVエラー: '+err.message);}
    ev.target.value='';
  };
  r.readAsText(file,'Shift-JIS');
}
function parseCSVL(line){
  const res=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(c===','&&!inQ){res.push(cur);cur='';}else cur+=c;}
  res.push(cur);return res;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
