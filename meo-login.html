<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン — MEO統合管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'BIZ UDPGothic',sans-serif;min-height:100vh;background:linear-gradient(135deg,#0D1B3E 0%,#1E3160 55%,#0D1B3E 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.bg-circle1{position:absolute;top:-120px;left:-120px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(240,90,26,.18) 0%,transparent 65%);pointer-events:none}
.bg-circle2{position:absolute;bottom:-100px;right:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(6,182,212,.12) 0%,transparent 65%);pointer-events:none}
.bg-circle3{position:absolute;top:40%;left:60%;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,rgba(240,90,26,.07) 0%,transparent 65%);pointer-events:none}
.card{background:#fff;border-radius:20px;padding:44px 48px;width:440px;box-shadow:0 32px 80px rgba(5,10,25,.45);position:relative;z-index:1}
.logo{text-align:center;margin-bottom:36px}
.logo .brand{font-family:'Outfit',sans-serif;font-weight:800;font-size:26px;color:#0D1B3E;letter-spacing:.01em}
.logo .brand span{color:#F05A1A}
.logo .sub{font-size:11px;color:#9AABC8;margin-top:5px;letter-spacing:.06em}
.field{margin-bottom:18px}
.field label{font-size:12px;font-weight:700;color:#0D1B3E;display:block;margin-bottom:7px}
.field input{width:100%;padding:12px 14px;border:1.5px solid #E8ECF4;border-radius:10px;font-size:14px;font-family:'BIZ UDPGothic',sans-serif;color:#0D1B3E;outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus{border-color:#F05A1A;box-shadow:0 0 0 3px rgba(240,90,26,.1)}
.field .pw-wrap{position:relative}
.field .pw-wrap input{padding-right:44px}
.field .pw-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:17px;cursor:pointer;color:#9AABC8;user-select:none;transition:color .2s}
.field .pw-eye:hover{color:#5A6E94}
.field-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.field-row label{display:flex;align-items:center;gap:6px;font-size:12px;color:#5A6E94;cursor:pointer;font-weight:400}
.field-row a{font-size:12px;color:#F05A1A;text-decoration:none}
.field-row a:hover{text-decoration:underline}
.btn-login{width:100%;height:50px;background:linear-gradient(135deg,#F05A1A,#FF7A45);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;font-family:'BIZ UDPGothic',sans-serif;cursor:pointer;box-shadow:0 6px 20px rgba(240,90,26,.35);transition:opacity .2s,transform .15s;margin-bottom:20px}
.btn-login:hover{opacity:.92;transform:translateY(-1px)}
.btn-login:active{transform:translateY(0)}
.divider{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.divider span{font-size:11px;color:#9AABC8;white-space:nowrap}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#E8ECF4}
.sso-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.sso-btn{padding:11px 12px;border:1.5px solid #E8ECF4;border-radius:10px;background:#fff;font-size:12px;font-weight:700;font-family:'BIZ UDPGothic',sans-serif;color:#0D1B3E;cursor:pointer;transition:border-color .2s,background .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.sso-btn:hover{border-color:#9AABC8;background:#F4F6FA}
.footer{text-align:center;font-size:10px;color:#9AABC8;padding-top:16px;border-top:1px solid #E8ECF4}
/* エラー表示 */
.error-msg{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 14px;font-size:12px;color:#EF4444;margin-bottom:16px;display:none}
/* 成功アニメ */
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeIn .4s cubic-bezier(.25,.46,.45,.94)}
</style>
</head>
<body>
<div class="bg-circle1"></div>
<div class="bg-circle2"></div>
<div class="bg-circle3"></div>

<div class="card">
  <div class="logo">
    <div class="brand">MEO<span>統合管理</span></div>
    <div class="sub">Powered by iFLAG IFG IT Solutions</div>
  </div>

  <div class="error-msg" id="error-msg">メールアドレスまたはパスワードが正しくありません。</div>

  <div class="field">
    <label for="email">メールアドレス</label>
    <input type="email" id="email" placeholder="admin@sample-food.co.jp" value="admin@sample-food.co.jp" autocomplete="email">
  </div>

  <div class="field">
    <label for="password">パスワード</label>
    <div class="pw-wrap">
      <input type="password" id="password" placeholder="••••••••" value="password" autocomplete="current-password">
      <span class="pw-eye" onclick="togglePw()">👁</span>
    </div>
    <div class="field-row">
      <label><input type="checkbox" id="remember" checked> ログイン状態を保持する</label>
      <a href="#">パスワードを忘れた方</a>
    </div>
  </div>

  <button class="btn-login" onclick="doLogin()">ログイン</button>

  <div class="divider"><span>または SSOでログイン</span></div>

  <div class="sso-grid">
    <button class="sso-btn" onclick="doSSO('Google')">
      <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.2 30.2 0 24 0 14.7 0 6.8 5.4 2.9 13.2l7.9 6.1C12.6 13.2 17.9 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.7-.2-3.3-.4-4.9H24v9.3h12.4c-.5 2.9-2.1 5.4-4.5 7l7.1 5.5c4.1-3.8 6.5-9.4 7.1-16.9z"/><path fill="#FBBC05" d="M10.8 28.7c-.5-1.4-.8-2.9-.8-4.5s.3-3.1.8-4.5l-7.9-6.1C1.1 16.9 0 20.3 0 24s1.1 7.1 2.9 10.4l7.9-5.7z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.1-5.5c-2 1.4-4.6 2.2-8.1 2.2-6.1 0-11.3-4.1-13.2-9.7l-7.9 5.7C6.8 42.6 14.7 48 24 48z"/></svg>
      Google Workspace
    </button>
    <button class="sso-btn" onclick="doSSO('Microsoft')">
      <svg width="16" height="16" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#F35325"/><rect x="11" y="1" width="9" height="9" fill="#81BC06"/><rect x="1" y="11" width="9" height="9" fill="#05A6F0"/><rect x="11" y="11" width="9" height="9" fill="#FFBA08"/></svg>
      Microsoft 365
    </button>
  </div>

  <div class="footer">© 2026 iFLAG IFG IT Solutions. All rights reserved.<br>本画面はモックアップです。</div>
</div>

<script>
function togglePw() {
  var inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
function doLogin() {
  var email = document.getElementById('email').value;
  var pw = document.getElementById('password').value;
  var err = document.getElementById('error-msg');
  if (!email || !pw) {
    err.style.display = 'block';
    err.textContent = 'メールアドレスとパスワードを入力してください。';
    return;
  }
  // モック：正しい認証情報でダッシュボードへ
  if (email === 'admin@sample-food.co.jp' && pw === 'password') {
    err.style.display = 'none';
    document.querySelector('.btn-login').textContent = '✓ ログイン中...';
    setTimeout(function(){ window.location.href = 'meo-dashboard.html'; }, 800);
  } else {
    err.style.display = 'block';
    err.textContent = 'メールアドレスまたはパスワードが正しくありません。';
  }
}
function doSSO(provider) {
  document.querySelector('.btn-login').style.display = 'none';
  document.querySelector('.error-msg').style.display = 'none';
  setTimeout(function(){ window.location.href = 'meo-dashboard.html'; }, 600);
}
document.getElementById('password').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
